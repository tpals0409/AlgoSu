# AlgoSu — Production Overlay
# 고가용성, 강화된 리소스, 보안 강화
# Sealed Secrets: kubeseal 후 별도 적용 (kubectl apply -f sealed-secret.yaml)
# 사용법: kubectl apply -k infra/overlays/prod/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../k3s

labels:
  - pairs:
      environment: prod

patches:
  # Prod: identity-service 2 replicas (HPA 미적용 서비스)
  # gateway, submission-service는 HPA가 replicas를 관리하므로 수동 설정 제거
  - target:
      kind: Deployment
      name: identity-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

  # Prod: HPA minReplicas 2로 상향 (고가용성)
  - target:
      kind: HorizontalPodAutoscaler
      name: gateway
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2

  - target:
      kind: HorizontalPodAutoscaler
      name: submission-service
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2

  # Prod: Gateway 리소스 강화
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"

  # Prod: Submission 리소스 강화
  - target:
      kind: Deployment
      name: submission-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"

  # Prod: AI Analysis 리소스 강화
  - target:
      kind: Deployment
      name: ai-analysis-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"

  # Prod: PostgreSQL PVC 확장
  - target:
      kind: PersistentVolumeClaim
      name: postgres-pvc
    patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: "20Gi"

  # Prod: postgres-problem PVC 확장
  - target:
      kind: PersistentVolumeClaim
      name: postgres-problem-pvc
    patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: "10Gi"

  # Prod: postgres-problem 리소스 강화
  - target:
      kind: Deployment
      name: postgres-problem
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"

  # Prod: Prometheus 보존 30일 + PVC 확장
  - target:
      kind: Deployment
      name: prometheus
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/args/3
        value: "--storage.tsdb.retention.time=30d"

  - target:
      kind: PersistentVolumeClaim
      name: prometheus-pvc
    patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: "20Gi"

  # Prod: MinIO PVC 확장
  - target:
      kind: PersistentVolumeClaim
      name: minio-pvc
    patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: "5Gi"

  # Prod: MinIO 리소스 강화
  - target:
      kind: Deployment
      name: minio
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"

  # Prod: Grafana 익명 접근 비활성화 (보안)
  - target:
      kind: Deployment
      name: grafana
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GF_AUTH_ANONYMOUS_ENABLED
          value: "false"
