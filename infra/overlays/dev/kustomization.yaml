# AlgoSu — Dev Overlay (k3s 단일 노드)
# Base와 동일 (최소 리소스, 1 replica)
# 사용법: kubectl apply -k infra/overlays/dev/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../k3s

labels:
  - pairs:
      environment: dev

images:
  - name: ghcr.io/OWNER/algosu-gateway
    newName: algosu-gateway
    newTag: dev
  - name: ghcr.io/OWNER/algosu-identity
    newName: algosu-identity
    newTag: dev
  - name: ghcr.io/OWNER/algosu-submission
    newName: algosu-submission
    newTag: dev
  - name: ghcr.io/OWNER/algosu-problem
    newName: algosu-problem
    newTag: dev
  - name: ghcr.io/OWNER/algosu-ai-analysis
    newName: algosu-ai-analysis
    newTag: dev
  - name: ghcr.io/OWNER/algosu-github-worker
    newName: algosu-github-worker
    newTag: dev
  - name: ghcr.io/OWNER/algosu-frontend
    newName: algosu-frontend
    newTag: dev

patches:
  # Dev: 모든 Deployment를 1 replica로 고정
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Dev: Grafana 익명 접근 허용 (로컬 개발 편의)
  - target:
      kind: Deployment
      name: grafana
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: "Viewer"

  # Dev: k3d local-path provisioner는 fsGroup/runAsNonRoot를 제대로 지원하지 않음
  # Stateful 서비스의 pod securityContext를 제거하여 이미지 기본 uid로 실행
  - target:
      kind: Deployment
      name: postgres
    patch: |
      - op: remove
        path: /spec/template/spec/securityContext
  - target:
      kind: Deployment
      name: postgres-problem
    patch: |
      - op: remove
        path: /spec/template/spec/securityContext
  - target:
      kind: Deployment
      name: minio
    patch: |
      - op: remove
        path: /spec/template/spec/securityContext
  - target:
      kind: Deployment
      name: rabbitmq
    patch: |
      - op: remove
        path: /spec/template/spec/securityContext

  # Dev: 현재 :dev 이미지의 /health/ready 엔드포인트가 미구현(404) 또는 인증 차단(401)
  # readinessProbe를 /health로 대체하여 파드 Ready 전환 보장
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/path
        value: /health
  - target:
      kind: Deployment
      name: identity-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/path
        value: /health
  - target:
      kind: Deployment
      name: submission-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/path
        value: /health
  - target:
      kind: Deployment
      name: problem-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/path
        value: /health
  - target:
      kind: Deployment
      name: ai-analysis-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/path
        value: /health

  # Dev: Blog 서비스 비활성화 (이미지 미빌드 + pull secret 부재)
  - target:
      kind: Deployment
      name: blog
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0
      - op: remove
        path: /spec/template/spec/imagePullSecrets
