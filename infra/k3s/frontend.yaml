# AlgoSu Frontend — k3s Deployment (Next.js standalone)
# 이미지 태그: main-{git-sha} (latest 사용 금지)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: algosu
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/OWNER/algosu-frontend:main-PLACEHOLDER
          ports:
            - containerPort: 3001
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: ""
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: algosu
spec:
  selector:
    app: frontend
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
