---
# AlgoSu Identity Service — k3s Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: algosu
  labels:
    app: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      initContainers:
        - name: db-migrate
          image: ghcr.io/OWNER/algosu-identity:main-PLACEHOLDER
          command: ["npm", "run", "migration:run"]
          envFrom:
            - secretRef:
                name: identity-service-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      containers:
        - name: identity-service
          image: ghcr.io/OWNER/algosu-identity:main-PLACEHOLDER
          ports:
            - containerPort: 3004
          envFrom:
            - secretRef:
                name: identity-service-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "400Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: algosu
spec:
  selector:
    app: identity-service
  ports:
    - port: 3004
      targetPort: 3004
  type: ClusterIP
