---
# AlgoSu API Gateway — k3s Deployment
# JWT 검증, Rate Limit (Redis), 서비스 라우팅, SSE
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: algosu
  labels:
    app: gateway
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/OWNER/algosu-gateway:main-PLACEHOLDER
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: gateway-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "400Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: algosu
spec:
  selector:
    app: gateway
  ports:
    - port: 3000
      targetPort: 3000
  type: LoadBalancer
