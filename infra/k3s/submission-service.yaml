---
# AlgoSu Submission Service — k3s Deployment
# Init Container: DB Migration 먼저 실행 → 앱 시작
apiVersion: apps/v1
kind: Deployment
metadata:
  name: submission-service
  namespace: algosu
  labels:
    app: submission-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: submission-service
  template:
    metadata:
      labels:
        app: submission-service
    spec:
      initContainers:
        - name: db-migrate
          image: ghcr.io/OWNER/algosu-submission:main-PLACEHOLDER
          command: ["npm", "run", "migration:run"]
          envFrom:
            - secretRef:
                name: submission-service-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      containers:
        - name: submission-service
          image: ghcr.io/OWNER/algosu-submission:main-PLACEHOLDER
          ports:
            - containerPort: 3003
          envFrom:
            - secretRef:
                name: submission-service-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "400Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: submission-service
  namespace: algosu
spec:
  selector:
    app: submission-service
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
