apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-monitoring
  namespace: algosu
  labels:
    app: cloudflared-monitoring
    app.kubernetes.io/part-of: algosu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared-monitoring
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cloudflared-monitoring
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
      - name: cloudflared
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        image: cloudflare/cloudflared:2026.3.0
        args:
        - --metrics
        - "0.0.0.0:2000"
        - tunnel
        - --no-autoupdate
        - run
        - --token
        - $(TUNNEL_TOKEN)
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-monitoring-token
              key: token
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /ready
            port: 2000
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]
      volumes:
      - name: tmp
        emptyDir: {}
