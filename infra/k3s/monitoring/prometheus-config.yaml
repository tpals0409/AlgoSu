# ============================================================
# AlgoSu — Prometheus 설정
# 스크랩 주기: 30s (Free Tier 리소스 절감)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: algosu
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: 'gateway'
        static_configs:
          - targets: ['gateway:3000']
        metrics_path: /metrics

      - job_name: 'identity-service'
        static_configs:
          - targets: ['identity-service:3004']
        metrics_path: /metrics

      - job_name: 'submission-service'
        static_configs:
          - targets: ['submission-service:3003']
        metrics_path: /metrics

      - job_name: 'problem-service'
        static_configs:
          - targets: ['problem-service:3002']
        metrics_path: /metrics

      - job_name: 'ai-analysis'
        static_configs:
          - targets: ['ai-analysis-service:8000']
        metrics_path: /metrics

      # github-worker: DLQ 카운터 + MQ 처리량 + Node.js 기본 메트릭
      - job_name: 'github-worker'
        static_configs:
          - targets: ['github-worker-metrics:9100']
        metrics_path: /metrics

      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics:8080']
        metrics_path: /metrics

      - job_name: 'rabbitmq'
        static_configs:
          - targets: ['rabbitmq:15692']
        metrics_path: /metrics

      # Sprint 130 B-1: ArgoCD Application Health/Sync 메트릭 수집
      # argocd-metrics: Application 단위 (argocd_app_info, argocd_app_sync_total)
      # argocd-server-metrics: API server 단위 (argocd_*_request_duration_seconds 등)
      - job_name: 'argocd-metrics'
        static_configs:
          - targets: ['argocd-metrics.argocd.svc.cluster.local:8082']
        metrics_path: /metrics

      - job_name: 'argocd-server-metrics'
        static_configs:
          - targets: ['argocd-server-metrics.argocd.svc.cluster.local:8083']
        metrics_path: /metrics

      # kubelet cAdvisor: container_cpu/memory 등 컨테이너 리소스 메트릭 (Service Debug 대시보드
      # Container CPU/Memory 패널 소스). apiserver proxy 경유 — k3s read-only port 미노출 대응.
      - job_name: 'kubernetes-cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      # kubelet node 메트릭 (kubelet_*) — apiserver proxy 경유
      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: algosu
  labels:
    app: prometheus
    component: monitoring
spec:
  replicas: 1
  # PVC(TSDB lock) 사용 시 RollingUpdate는 lock 충돌 발생 → Recreate 필수
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        component: monitoring
    spec:
      # kubernetes_sd(role:node) + apiserver proxy 경유 cAdvisor 스크레이프용 SA
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          ports:
            - containerPort: 9090
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.enable-lifecycle
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-rules
              mountPath: /etc/prometheus/rules
            - name: prometheus-storage
              mountPath: /prometheus
          # M20: liveness/readiness probe 추가
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-rules
          configMap:
            name: prometheus-rules
        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: prometheus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: algosu
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: algosu
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# kubernetes_sd(role:node) + apiserver proxy(/api/v1/nodes/.../proxy/metrics[/cadvisor])
# 스크레이프 권한. nodes/nodes/metrics/nodes/proxy + nonResourceURLs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: algosu
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: algosu-prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: algosu-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: algosu-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: algosu
