# ============================================================
# AlgoSu — Loki 로그 수집
# 보존 기간: 72h (Free Tier 스토리지 절감)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: algosu
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    ingester:
      wal:
        dir: /loki/wal
      lifecycler:
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/tsdb-index
        cache_location: /loki/tsdb-cache
      filesystem:
        directory: /loki/chunks

    limits_config:
      retention_period: 72h
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 8
      allow_structured_metadata: true

    compactor:
      working_directory: /loki/compactor
      delete_request_store: filesystem
      retention_enabled: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: algosu
  labels:
    app: loki
    component: monitoring
spec:
  replicas: 1
  # RWO PVC + single-instance compactor — RollingUpdate 시 신구 pod 동시 실행이
  # 같은 인덱스/delete-store 경합(compactor init timeout) → Recreate 필수 (prometheus 동일 패턴)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
        component: monitoring
    spec:
      # 하드닝: loki 이미지 기본 uid(10001)로 고정 + non-root + PVC fsGroup
      # 라이브 검증: 프로세스 이미 uid=10001, 저장 경로 전부 /loki(PVC) 하위 → readOnlyRootFS 안전
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: loki
          image: grafana/loki:3.3.2
          ports:
            - containerPort: 3100
          args:
            - -config.file=/etc/loki/loki.yaml
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            # readOnlyRootFilesystem 제외: compactor가 filesystem delete_request_store
            # (retention_enabled=true)를 root FS에 쓰려다 "init delete store: timeout" CrashLoop.
            # 저장 경로는 /loki(PVC)이나 delete-store 경로는 root FS라 RO 불가.
          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki
            - name: loki-storage
              mountPath: /loki
          # liveness/readiness probe
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      volumes:
        - name: loki-config
          configMap:
            name: loki-config
        - name: loki-storage
          persistentVolumeClaim:
            claimName: loki-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: algosu
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-pvc
  namespace: algosu
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
