# ============================================================
# AlgoSu — Promtail DaemonSet (Pod 로그 → Loki)
# 모든 노드에 배포, /var/log/pods 로그 수집
# JSON 구조화 로그 파싱 → Loki label 추출
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: algosu
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: algosu-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # algosu 네임스페이스 Pod만 수집
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: algosu
          # namespace 레이블
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          # pod 이름 레이블 (대시보드 쿼리 pod=~"${service}.*"용)
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # app 레이블 (Pod의 app 라벨을 그대로 노출)
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          # container 이름
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          # 로그 경로: /var/log/pods/<namespace>_<pod-name>_<uid>/<container>/*.log
          - source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_pod_name
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
            separator: /
            replacement: /var/log/pods/$1_$2_$3/$4/*.log

        pipeline_stages:
          # CRI 포맷 파싱: <timestamp> <stream> <flags> <message>
          - cri: {}
          # JSON 로그 파싱 (monitoring-log-rules.md §1-1)
          - json:
              expressions:
                level: level
                traceId: traceId
                tag: tag
          # level, tag를 Loki 라벨로 승격 (service는 app 레이블로 대체됨)
          - labels:
              level:
              tag:
          # traceId는 structured metadata로 (라벨 카디널리티 방지)
          - structured_metadata:
              traceId:
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: algosu
  labels:
    app: promtail
    component: monitoring
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
        component: monitoring
    spec:
      serviceAccountName: promtail
      securityContext:
        runAsUser: 0
      containers:
        - name: promtail
          image: grafana/promtail:2.9.8
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - containerPort: 9080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: promtail-config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: promtail-config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: algosu
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: algosu
