# ============================================================
# AlgoSu — Promtail DaemonSet (Pod 로그 → Loki)
# 모든 노드에 배포, /var/log/pods 로그 수집
# JSON 구조화 로그 파싱 → Loki label 추출
# ============================================================
# 라벨 모델 (Sprint 234): namespace + service + level + tag (라이브 aether-gitops 정합).
#    service/level/tag는 JSON 로그 필드에서 승격(service = SERVICE_NAME). Service Debug
#    대시보드의 service="${service}" 셀렉터와 정합. traceId는 본문 JSON 유지.
#    ⚠️ 잔여 드리프트: 라이브는 static_configs(파일경로 __path__) discovery이나 본 미러는
#    kubernetes_sd(role:pod) discovery — 라벨 출력은 동일, discovery 메커니즘만 상이
#    (라이브 promtail-config 전문 부재로 discovery 형태까지는 미정합 → ADR sprint-234 후속 시드).
#    (infra/k3s는 비배포 참조 미러 — 배포 SSOT는 aether-gitops. Sprint 232 확정)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: algosu
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: algosu-pods
        kubernetes_sd_configs:
          - role: pod
            # 현재 노드의 Pod만 수집 — DaemonSet 표준 패턴
            selectors:
              - role: pod
                field: spec.nodeName=${HOSTNAME}
        relabel_configs:
          # algosu 네임스페이스 Pod만 수집
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: algosu
          # namespace 레이블 (라이브 정합 라벨셋: namespace + service + level + tag, ≤5)
          # pod/app/container 라벨은 드롭 — Service Debug 대시보드 Loki 패널이 service 라벨로
          # 전환되어(Sprint 234) 불필요, 라이브(service 라벨셋) 정합 + 카디널리티 절감.
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          # 로그 경로: /var/log/pods/*<uid>/<container>/*.log
          # kubelet 로그 디렉토리 규칙: namespace_pod-name_uid/container-name/*.log
          # glob 패턴 * 로 namespace_pod-name_ prefix 매칭
          - source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
            separator: /
            regex: (.+)/(.+)
            replacement: /var/log/pods/*$1/$2/*.log

        pipeline_stages:
          # CRI 포맷 파싱: <timestamp> <stream> <flags> <message>
          - cri: {}
          # JSON 로그 파싱 (monitoring-logging.md §1-1)
          - json:
              expressions:
                level: level
                service: service
                traceId: traceId
                tag: tag
          # level, service, tag를 Loki 라벨로 승격 (service = JSON service 필드 =
          # SERVICE_NAME: gateway|submission|problem|identity|ai-analysis|github-worker.
          # 대시보드 service="${service}" 셀렉터와 정합 — 라이브 라벨 모델)
          - labels:
              level:
              service:
              tag:
          # traceId는 로그 본문에 JSON으로 남아있음 (Loki structured_metadata 미사용 —
          # loki-config.yaml: allow_structured_metadata: false)
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: algosu
  labels:
    app: promtail
    component: monitoring
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
        component: monitoring
    spec:
      serviceAccountName: promtail
      securityContext:
        runAsUser: 0
      containers:
        - name: promtail
          image: grafana/promtail:2.9.8
          args:
            - -config.expand-env=true
            - -config.file=/etc/promtail/promtail.yaml
          env:
            # kubernetes_sd_configs의 spec.nodeName 필터에서 사용
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 9080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: promtail-config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: promtail-config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: algosu
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: algosu
