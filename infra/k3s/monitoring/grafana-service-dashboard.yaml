# AlgoSu — Service Debug Dashboard ConfigMap
# 서비스별 디버깅 대시보드 (Template Variable 기반 서비스 선택)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-service-dashboard
  namespace: algosu
data:
  algosu-service-debug.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "asDropdown": false,
          "icon": "dashboard",
          "includeVars": false,
          "keepTime": true,
          "tags": [],
          "targetBlank": false,
          "title": "SLO Overview",
          "tooltip": "SLO 대시보드로 이동",
          "type": "link",
          "url": "/grafana/d/algosu-slo/algosu-slo-overview"
        }
      ],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "HTTP Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "mode": "none" }
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Request Rate by Path",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (path) (rate(algosu_${service}_http_requests_total[5m]))",
              "legendFormat": "{{path}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 1,
                "stacking": { "mode": "normal" }
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 2,
          "options": {
            "legend": { "calcs": ["mean"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Request Rate by Status Code",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (status_code) (rate(algosu_${service}_http_requests_total[5m]))",
              "legendFormat": "{{status_code}}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 101,
          "title": "Latency & Errors",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "none" }
              },
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "id": 3,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Latency Percentiles",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(algosu_${service}_http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "P50"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(algosu_${service}_http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "P95"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(algosu_${service}_http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "P99"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "none" }
              },
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.3 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
          "id": 4,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Latency by Path (P95)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, path) (rate(algosu_${service}_http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "{{path}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 3 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "percent",
              "decimals": 2,
              "max": 100,
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 18 },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "5xx Error Rate",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(rate(algosu_${service}_http_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(algosu_${service}_http_requests_total[5m])) * 100 or vector(0)",
              "legendFormat": "Error %"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
