# AlgoSu — Grafana Datasource Provisioning
# Prometheus + Loki 자동 설정 (기동 시 수동 설정 불필요)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: algosu
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: false
