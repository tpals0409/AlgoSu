# AlgoSu — Prometheus Alert Rules
# 참조: docs/monitoring-log-rules.md §11-2
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: algosu
data:
  algosu-alerts.yml: |
    groups:
      # ================================================================
      # 1. 서비스 가용성
      # ================================================================
      - name: algosu.availability
        rules:
          - alert: ServiceDown
            expr: up{job=~"gateway|identity-service|submission-service|problem-service|ai-analysis"} == 0
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.job }} 서비스 다운"
              description: "{{ $labels.job }}이 30초 이상 응답하지 않습니다."

      # ================================================================
      # 2. 에러율
      # ================================================================
      - name: algosu.error_rate
        rules:
          - alert: HighErrorRate
            expr: |
              (
                sum by (job) (rate(algosu_gateway_http_errors_total{status_code=~"5.."}[5m]))
                / sum by (job) (rate(algosu_gateway_http_requests_total[5m]))
              ) * 100 > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Gateway 5xx 에러율 {{ $value | printf \"%.1f\" }}% (임계: 5%)"
              description: "5분 윈도우 기준 Gateway 에러율이 SLO 5%를 초과했습니다."

          - alert: HighErrorRate
            expr: |
              (
                sum by (job) (rate(algosu_identity_http_errors_total{status_code=~"5.."}[5m]))
                / sum by (job) (rate(algosu_identity_http_requests_total[5m]))
              ) * 100 > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Identity 5xx 에러율 {{ $value | printf \"%.1f\" }}% (임계: 5%)"
              description: "5분 윈도우 기준 Identity 에러율이 SLO 5%를 초과했습니다."

          - alert: HighErrorRate
            expr: |
              (
                sum by (job) (rate(algosu_submission_http_errors_total{status_code=~"5.."}[5m]))
                / sum by (job) (rate(algosu_submission_http_requests_total[5m]))
              ) * 100 > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Submission 5xx 에러율 {{ $value | printf \"%.1f\" }}% (임계: 5%)"
              description: "5분 윈도우 기준 Submission 에러율이 SLO 5%를 초과했습니다."

          - alert: HighErrorRate
            expr: |
              (
                sum by (job) (rate(algosu_problem_http_errors_total{status_code=~"5.."}[5m]))
                / sum by (job) (rate(algosu_problem_http_requests_total[5m]))
              ) * 100 > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Problem 5xx 에러율 {{ $value | printf \"%.1f\" }}% (임계: 5%)"
              description: "5분 윈도우 기준 Problem 에러율이 SLO 5%를 초과했습니다."

          - alert: CriticalErrorRate
            expr: |
              (
                sum(rate(algosu_gateway_http_errors_total{status_code=~"5.."}[5m]))
                / sum(rate(algosu_gateway_http_requests_total[5m]))
              ) * 100 > 15
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Gateway 치명적 에러율 {{ $value | printf \"%.1f\" }}% (임계: 15%)"
              description: "Gateway 에러율이 15%를 초과하여 즉시 조치가 필요합니다."

      # ================================================================
      # 3. 응답 시간
      # ================================================================
      - name: algosu.latency
        rules:
          - alert: HighLatencyP95
            expr: |
              histogram_quantile(0.95,
                sum by (le, job) (rate(algosu_gateway_http_request_duration_seconds_bucket[5m]))
              ) > 1.0
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "Gateway P95 응답시간 {{ $value | printf \"%.3f\" }}s (임계: 1.0s)"
              description: "Gateway P95 응답시간이 3분간 SLO 1.0초를 초과했습니다."

          - alert: HighLatencyP95
            expr: |
              histogram_quantile(0.95,
                sum by (le, job) (rate(algosu_submission_http_request_duration_seconds_bucket[5m]))
              ) > 1.0
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "Submission P95 응답시간 {{ $value | printf \"%.3f\" }}s (임계: 1.0s)"
              description: "Submission P95 응답시간이 3분간 SLO 1.0초를 초과했습니다."

      # ================================================================
      # 4. 인증/보안
      # ================================================================
      - name: algosu.security
        rules:
          - alert: AuthFailureRateHigh
            expr: |
              (
                sum(rate(algosu_identity_http_requests_total{status_code="401"}[5m]))
                / sum(rate(algosu_identity_http_requests_total[5m]))
              ) * 100 > 30
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "인증 실패율 {{ $value | printf \"%.1f\" }}% (임계: 30%)"
              description: "Identity 서비스의 401 응답 비율이 30%를 초과했습니다. 무차별 대입 공격 의심."

          - alert: InternalKeyViolation
            expr: |
              sum(increase(algosu_gateway_http_requests_total{status_code="403"}[5m])) > 5
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "내부 키 위반 감지 (5분 내 {{ $value }}회)"
              description: "5분 내 403 Forbidden 응답이 5회 이상 발생했습니다. X-Internal-Key 위반 의심."

      # ================================================================
      # 5. AI Analysis — Circuit Breaker
      # ================================================================
      - name: algosu.circuit_breaker
        rules:
          - alert: CircuitBreakerOpen
            expr: algosu_ai_analysis_circuit_breaker_state == 1
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "AI Analysis Circuit Breaker OPEN"
              description: "Claude API Circuit Breaker가 열림 상태입니다. AI 분석 기능이 차단되어 있습니다."

      # ================================================================
      # 6. 리소스 사용량
      # ================================================================
      - name: algosu.resources
        rules:
          - alert: HighMemoryUsage
            expr: |
              (
                algosu_gateway_nodejs_heap_size_used_bytes
                / algosu_gateway_nodejs_heap_size_total_bytes
              ) * 100 > 80
            for: 5m
            labels:
              severity: warning
              service: gateway
            annotations:
              summary: "Gateway 힙 메모리 사용률 {{ $value | printf \"%.1f\" }}% (임계: 80%)"
              description: "Gateway Node.js 힙 메모리가 5분간 80%를 초과했습니다."

          - alert: HighMemoryUsage
            expr: |
              (
                algosu_identity_nodejs_heap_size_used_bytes
                / algosu_identity_nodejs_heap_size_total_bytes
              ) * 100 > 80
            for: 5m
            labels:
              severity: warning
              service: identity
            annotations:
              summary: "Identity 힙 메모리 사용률 {{ $value | printf \"%.1f\" }}% (임계: 80%)"
              description: "Identity Node.js 힙 메모리가 5분간 80%를 초과했습니다."

          - alert: HighMemoryUsage
            expr: |
              (
                algosu_submission_nodejs_heap_size_used_bytes
                / algosu_submission_nodejs_heap_size_total_bytes
              ) * 100 > 80
            for: 5m
            labels:
              severity: warning
              service: submission
            annotations:
              summary: "Submission 힙 메모리 사용률 {{ $value | printf \"%.1f\" }}% (임계: 80%)"
              description: "Submission Node.js 힙 메모리가 5분간 80%를 초과했습니다."

          - alert: HighMemoryUsage
            expr: |
              (
                algosu_problem_nodejs_heap_size_used_bytes
                / algosu_problem_nodejs_heap_size_total_bytes
              ) * 100 > 80
            for: 5m
            labels:
              severity: warning
              service: problem
            annotations:
              summary: "Problem 힙 메모리 사용률 {{ $value | printf \"%.1f\" }}% (임계: 80%)"
              description: "Problem Node.js 힙 메모리가 5분간 80%를 초과했습니다."

      # ================================================================
      # 7. 메시징 — DLQ (Placeholder)
      # 향후 DLQ 카운터 메트릭 추가 시 활성화
      # ================================================================
      - name: algosu.messaging
        rules:
          - alert: DLQReceived
            expr: algosu_submission_dlq_messages_total > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "DLQ 메시지 감지 ({{ $value }}건)"
              description: "Dead Letter Queue에 메시지가 도달했습니다. Saga 실패 건 확인 필요."

      # ================================================================
      # 8. 인프라 — RabbitMQ
      # ================================================================
      - name: algosu.rabbitmq
        rules:
          - alert: RabbitMQUnackedHigh
            expr: rabbitmq_queue_messages_unacked > 100
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "RabbitMQ unacked 메시지 {{ $value }}건 (임계: 100)"
              description: "RabbitMQ에 처리되지 않은 메시지가 5분간 100건을 초과했습니다."
