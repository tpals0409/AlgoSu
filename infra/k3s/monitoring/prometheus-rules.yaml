# AlgoSu — Prometheus Alert Rules
# 참조: docs/monitoring-log-rules.md §11-2
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: algosu
data:
  algosu-alerts.yml: |
    groups:
      # ================================================================
      # 1. 서비스 가용성
      # ================================================================
      - name: algosu.availability
        rules:
          - alert: ServiceDown
            expr: up{job=~"gateway|identity-service|submission-service|problem-service|ai-analysis"} == 0
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.job }} 서비스 다운"
              description: "{{ $labels.job }}이 30초 이상 응답하지 않습니다."

      # ================================================================
      # 2-a. Recording Rules — 에러율 / 메모리 사용률
      # ================================================================
      - name: algosu.recording
        rules:
          # 서비스별 5xx 에러율 (5분 윈도우)
          - record: algosu:http_error_rate:5m
            expr: |
              (
                sum by (job) (rate({__name__=~"algosu_.+_http_errors_total", status_code=~"5.."}[5m]))
                / sum by (job) (rate({__name__=~"algosu_.+_http_requests_total"}[5m]))
              ) * 100

          # 서비스별 Node.js 힙 메모리 사용률
          - record: algosu:heap_memory_usage_pct
            expr: |
              (
                {__name__=~"algosu_.+_nodejs_heap_size_used_bytes"}
                / {__name__=~"algosu_.+_nodejs_heap_size_total_bytes"}
              ) * 100

      # ================================================================
      # 2-b. 에러율 알림
      # ================================================================
      - name: algosu.error_rate
        rules:
          - alert: HighErrorRate
            expr: algosu:http_error_rate:5m > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.job }} 5xx 에러율 {{ $value | printf \"%.1f\" }}% (임계: 5%)"
              description: "5분 윈도우 기준 {{ $labels.job }} 에러율이 SLO 5%를 초과했습니다."

          - alert: CriticalErrorRate
            expr: algosu:http_error_rate:5m{job="gateway"} > 15
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Gateway 치명적 에러율 {{ $value | printf \"%.1f\" }}% (임계: 15%)"
              description: "Gateway 에러율이 15%를 초과하여 즉시 조치가 필요합니다."

      # ================================================================
      # 3. 응답 시간
      # ================================================================
      - name: algosu.latency
        rules:
          - alert: HighLatencyP95
            expr: |
              histogram_quantile(0.95,
                sum by (le, job) (rate({__name__=~"algosu_.+_http_request_duration_seconds_bucket"}[5m]))
              ) > 1.0
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.job }} P95 응답시간 {{ $value | printf \"%.3f\" }}s (임계: 1.0s)"
              description: "{{ $labels.job }} P95 응답시간이 3분간 SLO 1.0초를 초과했습니다."

      # ================================================================
      # 4. 인증/보안
      # ================================================================
      - name: algosu.security
        rules:
          - alert: AuthFailureRateHigh
            expr: |
              (
                sum(rate(algosu_identity_http_requests_total{status_code="401"}[5m]))
                / sum(rate(algosu_identity_http_requests_total[5m]))
              ) * 100 > 30
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "인증 실패율 {{ $value | printf \"%.1f\" }}% (임계: 30%)"
              description: "Identity 서비스의 401 응답 비율이 30%를 초과했습니다. 무차별 대입 공격 의심."

          - alert: InternalKeyViolation
            expr: |
              sum(increase(algosu_gateway_http_requests_total{status_code="403"}[5m])) > 5
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "내부 키 위반 감지 (5분 내 {{ $value }}회)"
              description: "5분 내 403 Forbidden 응답이 5회 이상 발생했습니다. X-Internal-Key 위반 의심."

      # ================================================================
      # 5. AI Analysis — Circuit Breaker
      # ================================================================
      - name: algosu.circuit_breaker
        rules:
          - alert: CircuitBreakerOpen
            expr: algosu_ai_analysis_circuit_breaker_state == 1
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "AI Analysis Circuit Breaker OPEN"
              description: "Claude API Circuit Breaker가 열림 상태입니다. AI 분석 기능이 차단되어 있습니다."

      # ================================================================
      # 6. 리소스 사용량
      # ================================================================
      - name: algosu.resources
        rules:
          - alert: HighMemoryUsage
            expr: algosu:heap_memory_usage_pct > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.job }} 힙 메모리 사용률 {{ $value | printf \"%.1f\" }}% (임계: 80%)"
              description: "{{ $labels.job }} Node.js 힙 메모리가 5분간 80%를 초과했습니다."

      # ================================================================
      # 7. 메시징 — DLQ (Placeholder)
      # 향후 DLQ 카운터 메트릭 추가 시 활성화
      # ================================================================
      - name: algosu.messaging
        rules:
          - alert: DLQReceived
            expr: algosu_submission_dlq_messages_total > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "DLQ 메시지 감지 ({{ $value }}건)"
              description: "Dead Letter Queue에 메시지가 도달했습니다. Saga 실패 건 확인 필요."

      # ================================================================
      # 8. 인프라 — RabbitMQ
      # ================================================================
      - name: algosu.rabbitmq
        rules:
          - alert: RabbitMQUnackedHigh
            expr: rabbitmq_queue_messages_unacked > 100
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "RabbitMQ unacked 메시지 {{ $value }}건 (임계: 100)"
              description: "RabbitMQ에 처리되지 않은 메시지가 5분간 100건을 초과했습니다."

      # ================================================================
      # 9. 인프라 — Kubernetes Pod 상태
      # ================================================================
      - name: algosu.kubernetes
        rules:
          - alert: PodRestartFrequent
            expr: increase(kube_pod_container_status_restarts_total{namespace="algosu"}[1h]) > 3
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} 1시간 내 {{ $value | humanize }}회 재시작"
              description: "algosu 네임스페이스의 Pod가 빈번하게 재시작하고 있습니다. CrashLoopBackOff 확인 필요."

          - alert: HighCPUUsage
            expr: |
              (
                sum by (pod) (rate(container_cpu_usage_seconds_total{namespace="algosu"}[5m]))
                / sum by (pod) (kube_pod_container_resource_limits{namespace="algosu", resource="cpu"})
              ) * 100 > 90
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} CPU 사용률 {{ $value | printf \"%.1f\" }}% (임계: 90%)"
              description: "Pod CPU 사용률이 limits 대비 90%를 5분간 초과했습니다. HPA 스케일링 확인."

          - alert: OOMKilled
            expr: kube_pod_container_status_terminated_reason{namespace="algosu", reason="OOMKilled"} > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} OOMKilled"
              description: "algosu 네임스페이스의 Pod가 메모리 부족으로 종료되었습니다. 메모리 limits 증가 검토."
