# AlgoSu — SLO Dashboard ConfigMap
# Grafana provisioning으로 자동 로드되는 SLO 대시보드
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-slo-dashboard
  namespace: algosu
data:
  algosu-slo.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "SLO Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 99 },
                  { "color": "green", "value": 99.5 }
                ]
              },
              "unit": "percent",
              "decimals": 2
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Availability (SLO: 99.5%)",
          "type": "stat",
          "targets": [
            {
              "expr": "avg(up{job=~\"gateway|identity-service|submission-service|problem-service|ai-analysis\"}) * 100",
              "legendFormat": "Availability"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 3 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "percent",
              "decimals": 2,
              "max": 100,
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Error Rate (SLO: <5%)",
          "type": "stat",
          "targets": [
            {
              "expr": "((sum(rate(algosu_gateway_http_requests_total{status_code=~\"5..\"}[5m])) or vector(0)) + (sum(rate(algosu_identity_http_requests_total{status_code=~\"5..\"}[5m])) or vector(0)) + (sum(rate(algosu_submission_http_requests_total{status_code=~\"5..\"}[5m])) or vector(0)) + (sum(rate(algosu_problem_http_requests_total{status_code=~\"5..\"}[5m])) or vector(0)) + (sum(rate(algosu_ai_analysis_http_requests_total{status_code=~\"5..\"}[5m])) or vector(0))) / clamp_min((sum(rate(algosu_gateway_http_requests_total[5m])) or vector(0)) + (sum(rate(algosu_identity_http_requests_total[5m])) or vector(0)) + (sum(rate(algosu_submission_http_requests_total[5m])) or vector(0)) + (sum(rate(algosu_problem_http_requests_total[5m])) or vector(0)) + (sum(rate(algosu_ai_analysis_http_requests_total[5m])) or vector(0)), 1) * 100",
              "legendFormat": "Error Rate"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 0.8 },
                  { "color": "red", "value": 1.0 }
                ]
              },
              "unit": "s",
              "decimals": 3
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "P95 Latency (SLO: <1.0s)",
          "type": "stat",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate({__name__=~\"algosu_.+_http_request_duration_seconds_bucket\", job=~\"gateway|identity-service|submission-service|problem-service|ai-analysis\"}[5m])) by (le))",
              "legendFormat": "P95 (All Services)"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 2.0 },
                  { "color": "red", "value": 3.0 }
                ]
              },
              "unit": "s",
              "decimals": 3
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "P99 Latency (SLO: <3.0s)",
          "type": "stat",
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate({__name__=~\"algosu_.+_http_request_duration_seconds_bucket\", job=~\"gateway|identity-service|submission-service|problem-service|ai-analysis\"}[5m])) by (le))",
              "legendFormat": "P99 (All Services)"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 101,
          "title": "Service Health",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "options": { "0": { "color": "red", "text": "DOWN" }, "1": { "color": "green", "text": "UP" } }, "type": "value" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 8 },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Service Status",
          "type": "stat",
          "targets": [
            { "expr": "up{job=\"gateway\"}", "legendFormat": "Gateway" },
            { "expr": "up{job=\"identity-service\"}", "legendFormat": "Identity" },
            { "expr": "up{job=\"submission-service\"}", "legendFormat": "Submission" },
            { "expr": "up{job=\"problem-service\"}", "legendFormat": "Problem" },
            { "expr": "up{job=\"ai-analysis\"}", "legendFormat": "AI Analysis" }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 12 },
          "id": 102,
          "title": "Error Rate by Service",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 5 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 13 },
          "id": 6,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max"] }
          },
          "title": "5xx Error Rate (5m window) — SLO: <5%",
          "type": "timeseries",
          "targets": [
            {
              "expr": "(sum(rate(algosu_gateway_http_requests_total{status_code=~\"5..\"}[5m])) or vector(0)) / (sum(rate(algosu_gateway_http_requests_total[5m])) or vector(1)) * 100",
              "legendFormat": "Gateway"
            },
            {
              "expr": "(sum(rate(algosu_submission_http_requests_total{status_code=~\"5..\"}[5m])) or vector(0)) / (sum(rate(algosu_submission_http_requests_total[5m])) or vector(1)) * 100",
              "legendFormat": "Submission"
            },
            {
              "expr": "(sum(rate(algosu_problem_http_requests_total{status_code=~\"5..\"}[5m])) or vector(0)) / (sum(rate(algosu_problem_http_requests_total[5m])) or vector(1)) * 100",
              "legendFormat": "Problem"
            },
            {
              "expr": "(sum(rate(algosu_identity_http_requests_total{status_code=~\"5..\"}[5m])) or vector(0)) / (sum(rate(algosu_identity_http_requests_total[5m])) or vector(1)) * 100",
              "legendFormat": "Identity"
            },
            {
              "expr": "(sum(rate(algosu_ai_analysis_http_requests_total{status_code=~\"5..\"}[5m])) or vector(0)) / (sum(rate(algosu_ai_analysis_http_requests_total[5m])) or vector(1)) * 100",
              "legendFormat": "AI Analysis"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 21 },
          "id": 103,
          "title": "Latency Distribution",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1.0 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 22 },
          "id": 7,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "title": "P95 Latency by Service (SLO: <1.0s)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(algosu_gateway_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "Gateway"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(algosu_submission_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "Submission"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(algosu_problem_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "Problem"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(algosu_identity_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "Identity"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(algosu_ai_analysis_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "AI Analysis"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 3.0 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 22 },
          "id": 8,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "title": "P99 Latency by Service (SLO: <3.0s)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(algosu_gateway_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "Gateway"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(algosu_identity_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "Identity"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(algosu_submission_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "Submission"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(algosu_problem_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "Problem"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(algosu_ai_analysis_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "AI Analysis"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 30 },
          "id": 104,
          "title": "Throughput & Active Requests",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20,
                "showPoints": "never",
                "stacking": { "mode": "normal" }
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 31 },
          "id": 9,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(rate(algosu_gateway_http_requests_total[5m]))", "legendFormat": "Gateway" },
            { "expr": "sum(rate(algosu_identity_http_requests_total[5m]))", "legendFormat": "Identity" },
            { "expr": "sum(rate(algosu_submission_http_requests_total[5m]))", "legendFormat": "Submission" },
            { "expr": "sum(rate(algosu_problem_http_requests_total[5m]))", "legendFormat": "Problem" },
            { "expr": "sum(rate(algosu_ai_analysis_http_requests_total[5m]))", "legendFormat": "AI Analysis" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20,
                "showPoints": "never"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 31 },
          "id": 10,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "title": "Active Requests",
          "type": "timeseries",
          "targets": [
            { "expr": "algosu_gateway_http_active_requests", "legendFormat": "Gateway" },
            { "expr": "algosu_identity_http_active_requests", "legendFormat": "Identity" },
            { "expr": "algosu_submission_http_active_requests", "legendFormat": "Submission" },
            { "expr": "algosu_problem_http_active_requests", "legendFormat": "Problem" },
            { "expr": "algosu_ai_analysis_http_active_requests", "legendFormat": "AI Analysis" }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 39 },
          "id": 105,
          "title": "AI Analysis — Circuit Breaker & Claude",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "color": "green", "text": "CLOSED" },
                    "1": { "color": "orange", "text": "HALF_OPEN" },
                    "2": { "color": "red", "text": "OPEN" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 },
                  { "color": "red", "value": 2 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 40 },
          "id": 11,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Circuit Breaker State",
          "type": "stat",
          "targets": [
            {
              "expr": "algosu_ai_analysis_circuit_breaker_state{name=~\".+\"}",
              "legendFormat": "{{name}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 18, "x": 6, "y": 40 },
          "id": 12,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max"] }
          },
          "title": "Claude API Request Rate",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(rate(algosu_ai_analysis_http_requests_total{status_code=~\"2..\"}[5m])) or vector(0)", "legendFormat": "Success" },
            { "expr": "sum(rate(algosu_ai_analysis_http_requests_total{status_code=~\"[45]..\"}[5m])) or vector(0)", "legendFormat": "Error" }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 46 },
          "id": 106,
          "title": "Resource Usage",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20,
                "showPoints": "never"
              },
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 429496729 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 47 },
          "id": 13,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "title": "Heap Memory Used",
          "type": "timeseries",
          "targets": [
            { "expr": "algosu_gateway_nodejs_heap_size_used_bytes", "legendFormat": "Gateway" },
            { "expr": "algosu_identity_nodejs_heap_size_used_bytes", "legendFormat": "Identity" },
            { "expr": "algosu_submission_nodejs_heap_size_used_bytes", "legendFormat": "Submission" },
            { "expr": "algosu_problem_nodejs_heap_size_used_bytes", "legendFormat": "Problem" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20,
                "showPoints": "never"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 47 },
          "id": 14,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "title": "Event Loop Lag (seconds)",
          "type": "timeseries",
          "targets": [
            { "expr": "algosu_gateway_nodejs_eventloop_lag_seconds", "legendFormat": "Gateway" },
            { "expr": "algosu_identity_nodejs_eventloop_lag_seconds", "legendFormat": "Identity" },
            { "expr": "algosu_submission_nodejs_eventloop_lag_seconds", "legendFormat": "Submission" },
            { "expr": "algosu_problem_nodejs_eventloop_lag_seconds", "legendFormat": "Problem" }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["algosu", "slo"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "Asia/Seoul",
      "title": "AlgoSu SLO Dashboard",
      "uid": "algosu-slo",
      "version": 1
    }
