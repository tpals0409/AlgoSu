# ============================================================
# @file infra/k3s/monitoring/alertmanager.yaml
# AlgoSu — Alertmanager
# Discord webhook 기반 알림 전송
# [56-W1-1] alertmanager-discord 사이드카 미구성 확인 →
#   DISCORD_WEBHOOK_URL 환경변수 참조 구조로 변경 + TODO 명시
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: algosu
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'discord-webhook'

    receivers:
      - name: 'discord-webhook'
        webhook_configs:
          # TODO: Discord webhook URL 또는 alertmanager-discord 사이드카 설정 필요
          #   옵션 A) 사이드카 컨테이너 추가 후 url: 'http://localhost:9095'
          #   옵션 B) Discord webhook URL 직접 지정 (SealedSecret 권장)
          #   현재: 사이드카 미구성 상태이므로 DISCORD_WEBHOOK_URL 환경변수로 전환
          - url: '$DISCORD_WEBHOOK_URL'
            send_resolved: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: algosu
  labels:
    app: alertmanager
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        component: monitoring
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          ports:
            - containerPort: 9093
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          env:
            # TODO: Secret 'alertmanager-discord-secret' 생성 필요
            #   kubectl create secret generic alertmanager-discord-secret \
            #     --from-literal=webhook-url='https://discord.com/api/webhooks/...' -n algosu
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: alertmanager-discord-secret
                  key: webhook-url
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager
            - name: alertmanager-storage
              mountPath: /alertmanager
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config
        - name: alertmanager-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: algosu
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
  type: ClusterIP
