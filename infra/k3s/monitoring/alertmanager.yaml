# ============================================================
# @file infra/k3s/monitoring/alertmanager.yaml
# AlgoSu — Alertmanager
# @domain observability
# @related infra/k3s/monitoring/prometheus-rules.yaml, docs/runbook/monitoring-system-audit.md
#
# ⚠️ 비배포 참조 미러 (Sprint 232) — 이 파일은 ArgoCD가 배포하지 않는다.
#    실제 배포 SSOT는 aether-gitops(`algosu/base/monitoring/alertmanager.yaml`)이며,
#    AlgoSu CI는 aether-gitops에 이미지 태그만 bump하고 매니페스트는 전파하지 않는다.
#    → 운영 변경은 반드시 aether-gitops PR로. 이 미러는 라이브와 드리프트될 수 있다.
#    (Sprint 231이 이 미러의 구버전 스냅샷을 배포본으로 오독해 오판 → 본 파일을 라이브에 정합)
#
# Sprint 130 B-1: Identity 서비스 직접 webhook 방식은 Identity 자체 장애 시
# 알림 자체가 불가능한 SPoF 구조. AlertManager native discord_configs로 전환.
# severity별 라우팅 + 그룹화로 알림 폭주 방지.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: algosu
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      # 기본 라우팅: warning 이하 (1시간마다 반복)
      repeat_interval: 1h
      receiver: 'discord-default'
      routes:
        # critical 알림: 30분마다 반복하여 누락 방지
        - matchers:
            - severity = critical
          receiver: 'discord-critical'
          repeat_interval: 30m
          continue: false

    receivers:
      # Sprint 130 B-1: webhook URL은 identity-discord-secret(key: webhook-url)을 파일로 mount.
      # alertmanager v0.28+의 webhook_url_file 사용 → ConfigMap에 평문 미포함.
      - name: 'discord-default'
        discord_configs:
          - webhook_url_file: /etc/alertmanager/secrets/webhook-url
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            message: |
              {{ range .Alerts }}
              **{{ .Annotations.summary }}**
              {{ .Annotations.description }}
              severity: `{{ .Labels.severity }}` | namespace: `{{ .Labels.namespace }}`
              {{ end }}

      - name: 'discord-critical'
        discord_configs:
          - webhook_url_file: /etc/alertmanager/secrets/webhook-url
            send_resolved: true
            title: '[CRITICAL][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            message: |
              @here Critical alert
              {{ range .Alerts }}
              **{{ .Annotations.summary }}**
              {{ .Annotations.description }}
              severity: `{{ .Labels.severity }}` | namespace: `{{ .Labels.namespace }}` | pod: `{{ .Labels.pod }}`
              {{ end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: algosu
  labels:
    app: alertmanager
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        component: monitoring
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: alertmanager
          # Sprint 130 B-1: discord_configs.webhook_url_file 지원을 위해 v0.28.1로 업그레이드
          # (v0.27.0는 file 기반 webhook URL 미지원 — secret을 평문으로 ConfigMap에 inline해야 했음)
          image: prom/alertmanager:v0.28.1
          ports:
            - containerPort: 9093
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager
            - name: alertmanager-secrets
              mountPath: /etc/alertmanager/secrets
              readOnly: true
            - name: alertmanager-storage
              mountPath: /alertmanager
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config
        # Sprint 130 B-1: Discord webhook URL을 파일로 mount.
        # 기존 identity-discord-secret(key: webhook-url)을 재사용하여 SealedSecret 신규 봉인 부담 제거.
        # 동일 채널 사용 → 기존 Identity 발사 메시지와 alertmanager 발사 메시지가 같은 채널에 도착.
        # 향후 채널 분리 필요 시 alertmanager-discord-secret을 별도 SealedSecret으로 신규 봉인 후 secretName 교체.
        - name: alertmanager-secrets
          secret:
            secretName: identity-discord-secret
            optional: false
            items:
              - key: webhook-url
                path: webhook-url
        - name: alertmanager-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: algosu
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
  type: ClusterIP
