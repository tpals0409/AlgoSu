          port: 6379
    # problem-service에서 Redis 접근 (캐시)
    - from:
        - podSelector:
            matchLabels:
              app: problem-service
      ports:
        - protocol: TCP
          port: 6379
    # Prometheus exporter scrape 허용
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 6379

# -- 10. minio-ingress: gateway에서만 인바운드 허용 (아바타 업로드) --
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-ingress
  namespace: algosu
  labels:
    app.kubernetes.io/part-of: algosu
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    # gateway에서 MinIO API 접근 (아바타 업로드)
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 9000
    # minio-init Job에서 초기 설정
    - from:
        - podSelector:
            matchLabels:
              app: minio-init
      ports:
        - protocol: TCP
          port: 9000

