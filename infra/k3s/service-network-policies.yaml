# -- 9. redis-ingress: gateway, submission, github-worker에서만 인바운드 허용 --
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ingress
  namespace: algosu
  labels:
    app.kubernetes.io/part-of: algosu
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    # gateway에서 Redis 접근 (세션/캐시)
    - from:
        - podSelector:
            matchLabels:
