# ============================================================
# AlgoSu — 서비스간 NetworkPolicy
# 서비스별 인바운드 트래픽을 필요한 소스로만 제한
# ============================================================

# -- 1. gateway-ingress: 외부(Traefik)에서만 gateway 접근 허용 --
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-ingress
  namespace: algosu
  labels:
    app.kubernetes.io/part-of: algosu
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes:
    - Ingress
  ingress:
    # Traefik Ingress Controller (kube-system namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3000
    # Prometheus scrape 허용
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 3000

# -- 2. identity-ingress: gateway에서만 identity 접근 허용 --
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: identity-ingress
  namespace: algosu
  labels:
    app.kubernetes.io/part-of: algosu
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: identity-service
  policyTypes:
    - Ingress
  ingress:
    # gateway에서의 트래픽 허용
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 3004
    # Prometheus scrape 허용
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 3004

