# ============================================================
# AlgoSu — 서비스간 NetworkPolicy
# 서비스별 인바운드 트래픽을 필요한 소스로만 제한
# ============================================================

# -- 1. gateway-ingress: 외부(Traefik)에서만 gateway 접근 허용 --
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-ingress
  namespace: algosu
  labels:
    app.kubernetes.io/part-of: algosu
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes:
    - Ingress
  ingress:
    # Traefik Ingress Controller (kube-system namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3000
    # Prometheus scrape 허용
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 3000

# -- 2. identity-ingress: gateway에서만 identity 접근 허용 --
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: identity-ingress
  namespace: algosu
  labels:
    app.kubernetes.io/part-of: algosu
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: identity-service
  policyTypes:
    - Ingress
  ingress:
    # gateway에서의 트래픽 허용
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 3004
    # Prometheus scrape 허용
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 3004

# -- 3. submission-policy: Ingress(gateway) + Egress(postgres, redis, rabbitmq, problem, ai-analysis, DNS) --
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: submission-policy
  namespace: algosu
  labels:
    app.kubernetes.io/part-of: algosu
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: submission-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # gateway에서의 트래픽 허용
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 3003
    # Prometheus scrape 허용
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 3003
  egress:
    # PostgreSQL 접근 (submission_db)
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis 접근 (캐시/세션)
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # RabbitMQ AMQP 접근 (Saga 오케스트레이션)
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
    # problem-service 내부 호출
    - to:
        - podSelector:
            matchLabels:
              app: problem-service
      ports:
        - protocol: TCP
          port: 3002
    # ai-analysis-service 내부 호출
    - to:
        - podSelector:
            matchLabels:
              app: ai-analysis-service
      ports:
        - protocol: TCP
          port: 8000
    # DNS 조회 허용 (kube-system CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

