# -- 5. rabbitmq-ingress: submission, github-worker, ai-analysis에서만 접근 허용 --
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-ingress
  namespace: algosu
  labels:
    app.kubernetes.io/part-of: algosu
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
  ingress:
    # submission-service에서 AMQP 접근
    - from:
        - podSelector:
            matchLabels:
              app: submission-service
      ports:
        - protocol: TCP
          port: 5672
    # github-worker에서 AMQP 접근
    - from:
        - podSelector:
            matchLabels:
              app: github-worker
      ports:
        - protocol: TCP
          port: 5672
    # ai-analysis-service에서 AMQP 접근
    - from:
        - podSelector:
            matchLabels:
              app: ai-analysis-service
      ports:
        - protocol: TCP
          port: 5672
    # Prometheus scrape 허용 (rabbitmq_prometheus 플러그인)
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 15692

# -- 6. github-worker: Prometheus scrape(Ingress) + RabbitMQ/GitHub/DNS(Egress) --
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: github-worker-policy
  namespace: algosu
  labels:
    app.kubernetes.io/part-of: algosu
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: github-worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus scrape 허용 (메트릭 포트 9100)
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9100
  egress:
    # RabbitMQ AMQP 접근
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
    # GitHub API (HTTPS)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # DNS 조회 허용
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

