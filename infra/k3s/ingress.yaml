# AlgoSu — k3s Ingress (Traefik 기본 컨트롤러)
# Gateway API + Frontend 외부 노출
---
# ──────────────────────────────────────────────
# /internal 경로 외부 차단 — 보안 검증 완료 (2026-03-13, Scout W3-M14)
# ──────────────────────────────────────────────
# 방어 계층 1: Ingress — ipAllowList로 127.0.0.1/32만 허용 (외부 요청 403)
# 방어 계층 2: Application — InternalKeyGuard(x-internal-key 헤더) 검증
#
# 검증 항목:
#   - priority 100: Traefik auto-assign 기본값(경로 길이 기반, ~1-50)보다 높아 먼저 매칭됨 ✓
#   - 대소문자 우회(/Internal): Traefik PathPrefix는 case-sensitive, NestJS도 동일 → 404 ✓
#   - 이중 슬래시(//internal): Traefik이 경로 정규화 후 매칭 → 차단됨 ✓
#   - 경로 조작(/internal/..): Traefik이 path traversal 정규화 → 차단됨 ✓
#   - entryPoints: web + websecure 모두 포함 → HTTP/HTTPS 양쪽 차단 ✓
#   - 클러스터 내부 통신: ClusterIP Service 직접 호출, Ingress 미경유 → 영향 없음 ✓
# ──────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: block-internal-paths
  namespace: algosu
spec:
  ipAllowList:
    sourceRange:
      - "127.0.0.1/32"
---
# /internal 전용 차단 IngressRoute (외부 접근 → 403)
# 우선순위(priority)를 높여 algosu-ingress보다 먼저 매칭되도록 설정
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: algosu-block-internal
  namespace: algosu
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: PathPrefix(`/internal`)
      kind: Rule
      priority: 100
      middlewares:
        - name: block-internal-paths
      services:
        - name: gateway
          port: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: algosu-ingress
  namespace: algosu
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure,web
spec:
  rules:
    - http:
        paths:
          # API 요청 → Gateway
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /sse
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          # 모니터링 → Grafana (포트 3000, sub-path /grafana)
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          # 나머지 → Frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3001
