---
# AlgoSu AI Analysis Service — FastAPI + RabbitMQ Worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-analysis-service
  namespace: algosu
  labels:
    app: ai-analysis-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: ai-analysis-service
  template:
    metadata:
      labels:
        app: ai-analysis-service
    spec:
      containers:
        - name: ai-analysis-service
          image: ghcr.io/OWNER/algosu-ai-analysis:main-PLACEHOLDER
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ai-analysis-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-analysis-service
  namespace: algosu
spec:
  selector:
    app: ai-analysis-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
