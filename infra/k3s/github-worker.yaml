---
# AlgoSu GitHub Worker — k3s Deployment
# RabbitMQ 소비자 (prefetch=2), 서비스 엔드포인트 없음
# C5: RollingUpdate 전략 명시 (UI-6 인프라 개선)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-worker
  namespace: algosu
  labels:
    app: github-worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: github-worker
  template:
    metadata:
      labels:
        app: github-worker
    spec:
      containers:
        - name: github-worker
          image: ghcr.io/OWNER/algosu-github-worker:main-PLACEHOLDER
          envFrom:
            - secretRef:
                name: github-worker-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          # H13: Worker 프로세스 + RabbitMQ 연결 상태 확인
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "node -e \"const net=require('net');const s=new net.Socket();s.setTimeout(2000);s.connect(5672,'rabbitmq',()=>{s.destroy();process.exit(0)});s.on('error',()=>process.exit(1));s.on('timeout',()=>process.exit(1))\""
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
