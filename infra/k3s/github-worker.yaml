---
# AlgoSu GitHub Worker — k3s Deployment + Metrics Service
# RabbitMQ 소비자 (prefetch=2), metrics 엔드포인트 9100
# C5: RollingUpdate 전략 명시 (UI-6 인프라 개선)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-worker
  namespace: algosu
  labels:
    app: github-worker
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: github-worker
  template:
    metadata:
      labels:
        app: github-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 30
      containers:
        - name: github-worker
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          image: ghcr.io/OWNER/algosu-github-worker:main-PLACEHOLDER
          envFrom:
            - secretRef:
                name: github-worker-secrets
          ports:
            - containerPort: 9100
              name: metrics
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          # H13: Worker 프로세스 + RabbitMQ 연결 상태 확인
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "node -e \"const net=require('net');const s=new net.Socket();s.setTimeout(2000);s.connect(5672,'rabbitmq',()=>{s.destroy();process.exit(0)});s.on('error',()=>process.exit(1));s.on('timeout',()=>process.exit(1))\""
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "node -e \"const net=require('net');const s=new net.Socket();s.setTimeout(2000);s.connect(5672,'rabbitmq',()=>{s.destroy();process.exit(0)});s.on('error',()=>process.exit(1));s.on('timeout',()=>process.exit(1))\""
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
---
# github-worker Metrics Service — Prometheus scraper 전용
apiVersion: v1
kind: Service
metadata:
  name: github-worker-metrics
  namespace: algosu
  labels:
    app: github-worker
    component: metrics
spec:
  selector:
    app: github-worker
  ports:
    - port: 9100
      targetPort: 9100
      name: metrics
      protocol: TCP
  type: ClusterIP
