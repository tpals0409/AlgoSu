# ── Monitoring Secrets (1키) ──
# (Sprint 232: Sprint 231이 추가했던 ALERTMANAGER_DISCORD_WEBHOOK 제거 — 라이브 alertmanager는
#  기존 identity-discord-secret(key: webhook-url)을 재사용하므로 신규 키 불필요. 상세 sprint-231 ERRATA)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: monitoring-secrets
  namespace: algosu
spec:
  encryptedData:
    GRAFANA_ADMIN_PASSWORD: "<sealed>"

---
# ── Alertmanager Discord Secret (2키) ── [Sprint 235 선반영 → Sprint 236 라이브 적용 완료]
# 운영 알림 채널 분리: 기존엔 alertmanager가 identity-discord-secret(feedback 전용 webhook)을
# 재사용해 운영 알림과 사용자 피드백이 같은 Discord 채널에 혼재했다(Sprint 130 B-1 향후 과제).
# critical/일반 2채널 분리:
#   webhook-url          → 운영 알림 '일반' 채널(discord-default, warning 이하)
#   webhook-url-critical → 운영 알림 'critical' 채널(discord-critical, @here)
# ✅ Sprint 236에서 서버측 aether-gitops에 라이브 적용 완료(드리프트 해소). 실 봉인은 aether-gitops에서
#    수행(이 미러는 키 목록 참조용 템플릿, encryptedData는 placeholder 유지). 절차/검증: docs/runbook/alert-channel-separation.md
# (Sprint 232 ERRATA로 제거됐던 alertmanager webhook 키를 '채널 분리'라는 정당한 목적으로 재도입)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: alertmanager-discord-secret
  namespace: algosu
spec:
  encryptedData:
    webhook-url: "<sealed>"
    webhook-url-critical: "<sealed>"
