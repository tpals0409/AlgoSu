---
# H9: Sealed Secrets 템플릿 — 서비스별 Secret 키 목록 (실제 배포 기준 동기화)
#
# 사용법:
# 1. kubeseal CLI 설치: brew install kubeseal
# 2. 원본 Secret 작성 → kubeseal로 암호화 → 암호화된 YAML만 Git 커밋
# 3. 원본 Secret 파일은 절대 Git에 커밋 금지
#
# 예시:
#   kubectl create secret generic gateway-secrets \
#     --from-literal=JWT_SECRET=your_real_secret \
#     --from-literal=REDIS_URL=redis://redis:6379 \
#     ... \
#     --dry-run=client -o yaml | kubeseal -o yaml > sealed-gateway-secrets.yaml

# ── Gateway Secrets (22키) ──
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: gateway-secrets
  namespace: algosu
spec:
  encryptedData:
    # JWT
    JWT_SECRET: "<sealed>"
    JWT_EXPIRES_IN: "<sealed>"
    # Redis
    REDIS_URL: "<sealed>"
    # Internal API Keys (서비스 간)
    INTERNAL_API_KEY: "<sealed>"           # 다른 서비스 → Gateway 인바운드 인증
    INTERNAL_KEY_IDENTITY: "<sealed>"
    INTERNAL_KEY_PROBLEM: "<sealed>"
    INTERNAL_KEY_SUBMISSION: "<sealed>"
    INTERNAL_KEY_AI_ANALYSIS: "<sealed>"
    # 서비스 URL
    IDENTITY_SERVICE_URL: "<sealed>"
    PROBLEM_SERVICE_URL: "<sealed>"
    SUBMISSION_SERVICE_URL: "<sealed>"
    AI_ANALYSIS_SERVICE_URL: "<sealed>"
    # Frontend
    FRONTEND_URL: "<sealed>"
    ALLOWED_ORIGINS: "<sealed>"
    # OAuth — Google
    GOOGLE_CLIENT_ID: "<sealed>"
    GOOGLE_CLIENT_SECRET: "<sealed>"
    # OAuth — GitHub
    GITHUB_CLIENT_ID: "<sealed>"
    GITHUB_CLIENT_SECRET: "<sealed>"
    # OAuth — Kakao
    KAKAO_CLIENT_ID: "<sealed>"
    KAKAO_CLIENT_SECRET: "<sealed>"
    # OAuth — Naver
    NAVER_CLIENT_ID: "<sealed>"
    NAVER_CLIENT_SECRET: "<sealed>"
    # OAuth 콜백
    OAUTH_CALLBACK_URL: "<sealed>"
    # GitHub Token 암호화 키 (32바이트 hex)
    GITHUB_TOKEN_ENCRYPTION_KEY: "<sealed>"
    # Admin
    ADMIN_EMAILS: "<sealed>"                 # 피드백 관리 접근 제어 (쉼표 구분)
    # MinIO (프로필 이미지 스토리지)
    MINIO_ENDPOINT: "<sealed>"
    MINIO_PORT: "<sealed>"
    MINIO_ACCESS_KEY: "<sealed>"
    MINIO_SECRET_KEY: "<sealed>"
    MINIO_USE_SSL: "<sealed>"
    MINIO_PUBLIC_URL: "<sealed>"

---
# ── Identity Service Secrets (11키) ──
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: identity-service-secrets
  namespace: algosu
spec:
  encryptedData:
    DATABASE_HOST: "<sealed>"
    DATABASE_PORT: "<sealed>"
    DATABASE_NAME: "<sealed>"
    DATABASE_USER: "<sealed>"
    DATABASE_PASSWORD: "<sealed>"
    INTERNAL_API_KEY: "<sealed>"
    JWT_SECRET: "<sealed>"
    JWT_EXPIRES_IN: "<sealed>"
    # GitHub Token 암호화 키 (32바이트 hex, gateway-secrets와 동일)
    # token-encryption.service.ts:28-34 부팅 시 필수 검증, user.service.ts:136 암호화 사용
    GITHUB_TOKEN_ENCRYPTION_KEY: "<sealed>"
    # 피드백 → GitHub 이슈 연동 (fine-grained PAT, issues:write, 단일 레포 스코프)
    # github-issue.service.ts:37-39 — 미설정 시 이슈 생성 조용히 건너뜀(피드백 저장 무영향)
    GITHUB_FEEDBACK_ISSUE_TOKEN: "<sealed>"
    GITHUB_FEEDBACK_REPO: "<sealed>"          # 대상 레포 owner/repo (예: tpals0409/AlgoSu)

---
