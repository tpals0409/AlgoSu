# ============================================================
# AlgoSu ÔÇö GitHub Actions CI ÝîîýŁ┤ÝöäŰŁ╝ýŁŞ
#
# ŕĚťý╣Ö:
#   - path filterŰíť Ű│Çŕ▓ŻŰÉť ýäťŰ╣äýŐĄŰžî ÝůîýŐĄÝŐŞ+Ű╣îŰôť (Ű╣äýÜę ýáłŕ░É)
#   - ÝůîýŐĄÝŐŞ ÝćÁŕ│╝ ÝŤäýŚÉŰžî Docker Ű╣îŰôť ýžäÝľë
#   - ARM aarch64 ýŁ┤Ű»ŞýžÇ Ű╣îŰôť (OCI Free Tier: VM.Standard.A1.Flex)
#   - GHCR ÝĹŞýőť ÝâťŕĚŞ: main-{git-sha} (latest ÝâťŕĚŞ ýáłŰîÇ ŕŞłýžÇ)
# ============================================================

name: CI ÔÇö Test, Build & Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Force rebuild all services'
        required: false
        default: 'false'
      apk_bust:
        description: 'Force APK cache bust (apk upgrade ý×ČýőĄÝľë)'
        required: false
        default: 'false'

# ýÁťýćî ŕÂîÝĽť ýŤÉý╣Ö: ŕŞ░Ű│Ş ýáťŰíť, ŕ░ü jobýŚÉýäť ÝĽäýÜö ŕÂîÝĽťŰžî Ű¬ůýőť
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/algosu
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  APK_BUST_VALUE: ${{ github.event.inputs.apk_bust == 'true' && github.run_id || 'stable' }}

jobs:
  # ============================================================
  # Security Scan ÔÇö ýőťÝüČŰŽ┐ ýťáýÂť + .env ý╗ĄŰ░ő Ű░ęýžÇ (Ű¬ĘŰôá push/PRýŚÉ ýőĄÝľë)
  # ============================================================

  secret-scan:
    name: Secret & Env Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks secret scan
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --verbose
          else
            gitleaks detect --source . --config .gitleaks.toml --verbose
          fi

      - name: Reject committed .env files
        run: |
          # Git ýŁŞŰŹ▒ýŐĄ Űé┤ .env ÝîîýŁ╝ ÝâÉýžÇ (.env.example ýáťýÖŞ)
          VIOLATIONS=$(git ls-files | grep -E '(^|/)\.env($|\..*)' | grep -v '\.env\.example' || true)

          # PRýŁŞ ŕ▓ŻýÜ░: Ű│Çŕ▓Ż ÝîîýŁ╝ ýĄĹ .env ýÂöŕ░Ç ÝâÉýžÇ
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_ENV=$(git diff --name-only "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              | grep -E '(^|/)\.env($|\..*)' | grep -v '\.env\.example' || true)
            [ -n "$PR_ENV" ] && VIOLATIONS="$VIOLATIONS $PR_ENV"
          fi

          if [ -n "$(echo "$VIOLATIONS" | tr -d ' ')" ]; then
            echo "::error::SECURITY VIOLATION: .env files detected in Git"
            echo "ýťäŰ░ś ÝîîýŁ╝: $VIOLATIONS"
            echo "ýí░ý╣ś: git rm --cached <ÝîîýŁ╝Ű¬ů> ÝŤä .gitignore ÝÖĽýŁŞ"
            exit 1
          fi

          echo "env-check: PASS"

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      gateway:       ${{ steps.result.outputs.gateway }}
      identity:      ${{ steps.result.outputs.identity }}
      submission:    ${{ steps.result.outputs.submission }}
      problem:       ${{ steps.result.outputs.problem }}
      github-worker: ${{ steps.result.outputs.github-worker }}
      ai-analysis:   ${{ steps.result.outputs.ai-analysis }}
      frontend:      ${{ steps.result.outputs.frontend }}
      blog:          ${{ steps.result.outputs.blog }}
      monitoring:    ${{ steps.result.outputs.monitoring }}
      docs:          ${{ steps.result.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            gateway:
              - 'services/gateway/**'
              - 'scripts/ci/report-build-metrics.sh'
            identity:
              - 'services/identity/**'
              - 'scripts/ci/report-build-metrics.sh'
            submission:
              - 'services/submission/**'
              - 'scripts/ci/report-build-metrics.sh'
            problem:
              - 'services/problem/**'
              - 'scripts/ci/report-build-metrics.sh'
            github-worker:
              - 'services/github-worker/**'
              - 'scripts/ci/report-build-metrics.sh'
            ai-analysis:
              - 'services/ai-analysis/**'
              - 'scripts/ci/report-build-metrics.sh'
            frontend:
              - 'frontend/**'
              - 'scripts/ci/report-build-metrics.sh'
            blog:
              - 'blog/**'
              - 'docs/adr/**'
              - 'scripts/ci/report-build-metrics.sh'
            monitoring:
              - 'infra/k3s/monitoring/**'
              - 'scripts/check-prometheus-rules.mjs'
              - 'scripts/check-grafana-metrics.mjs'
              - 'scripts/check-regex-robustness.mjs'
              - 'services/**/metrics.service.ts'
              - 'services/**/metrics.ts'
              - 'services/**/metrics.py'
              - 'services/submission/src/common/circuit-breaker/circuit-breaker.service.ts'
              - 'services/github-worker/src/circuit-breaker.ts'
              - 'services/problem/src/database/dual-write.service.ts'
            docs:
              - 'docs/**/*.md'
              - '*.md'
              - '.claude/commands/**/*.md'
              - 'blog/content/**/*.mdx'
              - 'scripts/check-doc-refs.mjs'
              - 'scripts/check-adr-en-coverage.mjs'
      - name: Apply rebuild_all override
        id: result
        run: |
          if [ "${{ github.event.inputs.rebuild_all }}" = "true" ]; then
            echo "gateway=true" >> $GITHUB_OUTPUT
            echo "identity=true" >> $GITHUB_OUTPUT
            echo "submission=true" >> $GITHUB_OUTPUT
            echo "problem=true" >> $GITHUB_OUTPUT
            echo "github-worker=true" >> $GITHUB_OUTPUT
            echo "ai-analysis=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "blog=true" >> $GITHUB_OUTPUT
            echo "monitoring=true" >> $GITHUB_OUTPUT
            echo "docs=true" >> $GITHUB_OUTPUT
          else
            echo "gateway=${{ steps.filter.outputs.gateway }}" >> $GITHUB_OUTPUT
            echo "identity=${{ steps.filter.outputs.identity }}" >> $GITHUB_OUTPUT
            echo "submission=${{ steps.filter.outputs.submission }}" >> $GITHUB_OUTPUT
            echo "problem=${{ steps.filter.outputs.problem }}" >> $GITHUB_OUTPUT
            echo "github-worker=${{ steps.filter.outputs.github-worker }}" >> $GITHUB_OUTPUT
            echo "ai-analysis=${{ steps.filter.outputs.ai-analysis }}" >> $GITHUB_OUTPUT
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> $GITHUB_OUTPUT
            echo "blog=${{ steps.filter.outputs.blog }}" >> $GITHUB_OUTPUT
            echo "monitoring=${{ steps.filter.outputs.monitoring }}" >> $GITHUB_OUTPUT
            echo "docs=${{ steps.filter.outputs.docs }}" >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # Commit Lint ÔÇö PR ýőť Conventional Commits ŕ░Ľýáť
  # ============================================================

  commit-lint:
    name: Lint Commit Messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  # ============================================================
  # Quality Gate ÔÇö lint + typecheck (Ű│Çŕ▓ŻŰÉť ýäťŰ╣äýŐĄŰžî)
  # ============================================================

  quality-nestjs:
    name: Quality ÔÇö ${{ matrix.service }}
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
            has_eslint: 'true'
            lint_glob: '{src,test}/**/*.ts'
          - service: identity
            changed: ${{ needs.detect-changes.outputs.identity }}
            has_eslint: 'true'
            lint_glob: '{src,test}/**/*.ts'
          - service: submission
            changed: ${{ needs.detect-changes.outputs.submission }}
            has_eslint: 'true'
            lint_glob: '{src,test}/**/*.ts'
          - service: problem
            changed: ${{ needs.detect-changes.outputs.problem }}
            has_eslint: 'true'
            lint_glob: '{src,test}/**/*.ts'
          - service: github-worker
            changed: ${{ needs.detect-changes.outputs.github-worker }}
            has_eslint: 'true'
            lint_glob: 'src/**/*.ts'
    steps:
      - name: Skip if not changed
        id: check
        run: |
          if [ "${{ matrix.changed }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'
      # --- Composite action ---
      - name: Setup Node service (composite)
        if: steps.check.outputs.skip == 'false'
        uses: ./.github/actions/setup-node-service
        with:
          service-path: services/${{ matrix.service }}
          node-version: ${{ env.NODE_VERSION }}
      - name: ESLint
        if: steps.check.outputs.skip == 'false' && matrix.has_eslint == 'true'
        working-directory: services/${{ matrix.service }}
        run: npx eslint "${{ matrix.lint_glob }}"
      - name: TypeScript typecheck
        if: steps.check.outputs.skip == 'false'
        working-directory: services/${{ matrix.service }}
        run: npx tsc --noEmit
      - name: Check mock factory coverage
        if: steps.check.outputs.skip == 'false' && matrix.service == 'submission'
        run: node scripts/check-mock-coverage.mjs

  quality-python:
    name: Quality ÔÇö ai-analysis
    needs: detect-changes
    if: needs.detect-changes.outputs.ai-analysis == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-ruff-${{ env.PYTHON_VERSION }}
          restore-keys: |
            pip-ruff-
            pip-
      - name: Install ruff
        run: pip install ruff
      - name: ruff lint
        working-directory: services/ai-analysis
        run: ruff check src/
      - name: ruff format check
        working-directory: services/ai-analysis
        run: ruff format --check src/

  quality-monitoring:
    name: Quality ÔÇö monitoring
    needs: detect-changes
    if: needs.detect-changes.outputs.monitoring == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install promtool
        run: |
          PROM_VERSION=2.55.0
          curl -sSfL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" \
            | tar xz
          sudo mv "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/
          rm -rf "prometheus-${PROM_VERSION}.linux-amd64"
          promtool --version
      - name: Check prometheus rules syntax
        run: node scripts/check-prometheus-rules.mjs
      - name: Check grafana dashboard metrics Ôćö service code
        run: node scripts/check-grafana-metrics.mjs
      - name: Check regex robustness in scripts
        run: node scripts/check-regex-robustness.mjs

  quality-docs:
    name: Quality ÔÇö docs
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Check doc cross-refs
        run: node scripts/check-doc-refs.mjs
      - name: Check ADR EN coverage (strict)
        run: node scripts/check-adr-en-coverage.mjs --strict

  quality-frontend:
    name: Quality ÔÇö frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-node
        with:
          path: frontend/node_modules
          key: node-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            node-frontend-
      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm ci
      - name: next lint
        working-directory: frontend
        run: npx next lint
      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit

  # ============================================================
  # npm audit ÔÇö ýŁśýí┤ýä▒ Ű│┤ýĽł ýĚĘýĽŻýáÉ ýŐĄý║ö (high/critical ý░ĘŰőĘ)
  # ============================================================

  audit-npm:
    name: Audit ÔÇö ${{ matrix.service }}
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
            work_dir: services/gateway
          - service: identity
            changed: ${{ needs.detect-changes.outputs.identity }}
            work_dir: services/identity
          - service: submission
            changed: ${{ needs.detect-changes.outputs.submission }}
            work_dir: services/submission
          - service: problem
            changed: ${{ needs.detect-changes.outputs.problem }}
            work_dir: services/problem
          - service: github-worker
            changed: ${{ needs.detect-changes.outputs.github-worker }}
            work_dir: services/github-worker
          - service: frontend
            changed: ${{ needs.detect-changes.outputs.frontend }}
            work_dir: frontend
    steps:
      - name: Skip if not changed
        id: check
        run: |
          if [ "${{ matrix.changed }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'
      # --- Composite action ---
      - name: Setup Node service (composite)
        if: steps.check.outputs.skip == 'false'
        uses: ./.github/actions/setup-node-service
        with:
          service-path: ${{ matrix.work_dir }}
          node-version: ${{ env.NODE_VERSION }}
          install-command: 'npm ci --ignore-scripts'
      - name: npm audit (high/critical)
        if: steps.check.outputs.skip == 'false'
        working-directory: ${{ matrix.work_dir }}
        run: npm audit --audit-level=critical --omit=dev

  # ============================================================
  # Test Jobs ÔÇö Quality Gate ÝćÁŕ│╝ ÝŤäýŚÉŰžî ÝůîýŐĄÝŐŞ ýžäÝľë
  # ============================================================

  test-node:
    name: Test ${{ matrix.name }}
    needs: [detect-changes, quality-nestjs]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            name: Gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
            test_args: '--coverage --ci'
            work_dir: services/gateway
          - service: identity
            name: Identity
            changed: ${{ needs.detect-changes.outputs.identity }}
            test_args: '--coverage --ci --passWithNoTests'
            work_dir: services/identity
          - service: submission
            name: Submission
            changed: ${{ needs.detect-changes.outputs.submission }}
            test_args: '--coverage --ci --forceExit'
            work_dir: services/submission
          - service: problem
            name: Problem
            changed: ${{ needs.detect-changes.outputs.problem }}
            test_args: '--coverage --ci'
            work_dir: services/problem
          - service: github-worker
            name: GitHub Worker
            changed: ${{ needs.detect-changes.outputs.github-worker }}
            test_args: '--coverage --ci'
            work_dir: services/github-worker
    steps:
      - name: Skip if not changed
        id: check
        run: |
          if [ "${{ matrix.changed }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'
      # --- Composite action ---
      - name: Setup Node service (composite)
        if: steps.check.outputs.skip == 'false'
        uses: ./.github/actions/setup-node-service
        with:
          service-path: ${{ matrix.work_dir }}
          node-version: ${{ env.NODE_VERSION }}
      - name: Run unit tests
        if: steps.check.outputs.skip == 'false'
        working-directory: ${{ matrix.work_dir }}
        run: npm test -- ${{ matrix.test_args }}
      - name: Upload coverage
        if: always() && steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.work_dir }}/coverage/
          retention-days: 7

  test-ai-analysis:
    name: Test AI Analysis
    needs: [detect-changes, quality-python]
    if: needs.detect-changes.outputs.ai-analysis == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v5
        id: cache-pip
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('services/ai-analysis/requirements*.txt') }}
          restore-keys: |
            pip-
      - name: Install dependencies
        working-directory: services/ai-analysis
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests
        working-directory: services/ai-analysis
        run: python -m pytest tests/ -v --cov=src --cov-report=xml --cov-report=lcov:coverage/lcov.info
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-ai-analysis
          path: |
            services/ai-analysis/coverage.xml
            services/ai-analysis/coverage/lcov.info
          retention-days: 7

  test-frontend:
    name: Test Frontend
    needs: [detect-changes, quality-frontend]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-node
        with:
          path: frontend/node_modules
          key: node-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            node-frontend-
      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm ci
      - name: Run unit tests
        working-directory: frontend
        run: npm test -- --ci --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 7

  # ============================================================
  # Coverage Gate ÔÇö ŕŞÇŰíťŰ▓î 60% ý×äŕ│äý╣ś ŕ░Ľýáť (Node + AI Analysis + Frontend)
  # ============================================================

  coverage-gate:
    name: Coverage Gate
    needs: [test-node, test-ai-analysis, test-frontend]
    if: >-
      always() &&
      !cancelled() &&
      (needs.test-node.result == 'success' || needs.test-node.result == 'skipped') &&
      (needs.test-ai-analysis.result == 'success' || needs.test-ai-analysis.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: scripts/check-coverage.mjs
          sparse-checkout-cone-mode: false

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage/
          merge-multiple: false

      - name: Check coverage threshold
        id: coverage
        run: node scripts/check-coverage.mjs coverage/ 70

      - name: Comment PR with coverage
        if: always() && github.event_name == 'pull_request' && steps.coverage.outputs.coverage-body != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          message: ${{ steps.coverage.outputs.coverage-body }}

  # ============================================================
  # Build Jobs ÔÇö ÝůîýŐĄÝŐŞ ÝćÁŕ│╝ ÝŤä Docker Ű╣îŰôť + GHCR ÝĹŞýőť
  # ============================================================

  build-services:
    name: Build ${{ matrix.name }}
    needs: [detect-changes, test-node, test-ai-analysis, audit-npm, secret-scan]
    if: |
      !cancelled() &&
      (needs.test-node.result == 'success' || needs.test-node.result == 'skipped') &&
      (needs.test-ai-analysis.result == 'success' || needs.test-ai-analysis.result == 'skipped') &&
      (needs.audit-npm.result == 'success' || needs.audit-npm.result == 'skipped') &&
      needs.secret-scan.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            name: Gateway (NestJS)
            changed: ${{ needs.detect-changes.outputs.gateway }}
            context: ./services/gateway
          - service: identity
            name: Identity Service (NestJS)
            changed: ${{ needs.detect-changes.outputs.identity }}
            context: ./services/identity
          - service: submission
            name: Submission Service (NestJS)
            changed: ${{ needs.detect-changes.outputs.submission }}
            context: ./services/submission
          - service: problem
            name: Problem Service (NestJS)
            changed: ${{ needs.detect-changes.outputs.problem }}
            context: ./services/problem
          - service: github-worker
            name: GitHub Worker (Node.js)
            changed: ${{ needs.detect-changes.outputs.github-worker }}
            context: ./services/github-worker
          - service: ai-analysis
            name: AI Analysis Service (FastAPI)
            changed: ${{ needs.detect-changes.outputs.ai-analysis }}
            context: ./services/ai-analysis
    steps:
      - name: Skip if not changed
        id: check
        run: |
          if [ "${{ matrix.changed }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'
      - uses: docker/setup-qemu-action@v4
        if: steps.check.outputs.skip == 'false'
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v4
        if: steps.check.outputs.skip == 'false'
      - uses: docker/login-action@v4
        if: steps.check.outputs.skip == 'false'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Sprint 167 ýőťŰôť #165-2 + Sprint 166 D1: build duration ýŞíýáĽýÜę ýőťý×Ĺ ýőťŕ░ü ŕŞ░ŰíŁ.
      # docker buildx du ýÖÇ ŕ▓░ÝĽęŰÉśýľ┤ cache ŕ░Çýőťýä▒ ýőáÝśŞŰíť ÝćÁÝĽę ýÂťŰáąŰÉťŰőĄ.
      - name: Record build start time
        if: steps.check.outputs.skip == 'false'
        run: echo "BUILD_START=$(date +%s)" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v7
        if: steps.check.outputs.skip == 'false'
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64
          # Sprint 165 ýśÁýůś C: multi-output (main ÝĹŞýőť + ÝĽşýâü docker tarball)
          # Sprint 168 ýőťŰôť #167-1 ý▒äÝâŁ: zstd ýáäŰę┤ ýáüýÜę (Sprint 167 ýŞíýáĽ ÔÇö compression saving 63.7%,
          # build duration ÝÜîŕĚÇ -44.6% ÝćÁŕ│╝). 6 services Ű¬ĘŰĹÉ zstd ŰČ┤ýí░ŕ▒┤ ýâŁýä▒.
          # Trivy scan job ýŁÇ docker tarball `--input` Űžî ýéČýÜę Ôćĺ ÝśŞÝÖśýä▒ ÝÜîŕĚÇ zero.
          outputs: |
            type=image,push=${{ github.ref == 'refs/heads/main' }},name=${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:main-${{ github.sha }}
            type=docker,dest=/tmp/image-${{ matrix.service }}.tar
            type=oci,compression=zstd,dest=/tmp/image-${{ matrix.service }}-zstd.tar
          build-args: APK_CACHE_BUST=${{ env.APK_BUST_VALUE }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Upload image tarball for Trivy scan
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v6
        with:
          name: image-tar-${{ matrix.service }}
          path: /tmp/image-${{ matrix.service }}.tar
          retention-days: 1
      # Sprint 168 ýőťŰôť #167-3: 3 build job ýŁś ýĄĹŰ│Á ýĽŻ 30ýĄä ├Ś 3 = 90ýĄä ýŁä ŰőĘýŁ╝ ÝŚČÝŹ╝Űíť ÝćÁÝĽę.
      # ÝśŞýÂť ýŁŞý×É: <label> <docker_tarball> [zstd_tarball]. BUILD_START env ýŁśýí┤.
      - name: Report build artifact metrics
        if: steps.check.outputs.skip == 'false'
        run: bash scripts/ci/report-build-metrics.sh "${{ matrix.service }}" "/tmp/image-${{ matrix.service }}.tar" "/tmp/image-${{ matrix.service }}-zstd.tar"

  build-frontend:
    name: Build Frontend (Next.js)
    needs: [detect-changes, test-frontend, audit-npm, secret-scan]
    if: |
      !cancelled() &&
      needs.detect-changes.outputs.frontend == 'true' &&
      needs.test-frontend.result == 'success' &&
      (needs.audit-npm.result == 'success' || needs.audit-npm.result == 'skipped') &&
      needs.secret-scan.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Sprint 167 ýőťŰôť #165-2 + Sprint 166 D1: build duration ýŞíýáĽýÜę ýőťý×Ĺ ýőťŕ░ü ŕŞ░ŰíŁ.
      - name: Record build start time
        run: echo "BUILD_START=$(date +%s)" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          platforms: linux/arm64
          # Sprint 165 ýśÁýůś C: multi-output (main ÝĹŞýőť + ÝĽşýâü docker tarball)
          # Sprint 168 ýőťŰôť #167-1 ý▒äÝâŁ: zstd ýáäŰę┤ ýáüýÜę (frontend ÝĆČÝĽĘ)
          outputs: |
            type=image,push=${{ github.ref == 'refs/heads/main' }},name=${{ env.IMAGE_PREFIX }}-frontend:main-${{ github.sha }}
            type=docker,dest=/tmp/image-frontend.tar
            type=oci,compression=zstd,dest=/tmp/image-frontend-zstd.tar
          build-args: APK_CACHE_BUST=${{ env.APK_BUST_VALUE }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      - name: Upload image tarball for Trivy scan
        uses: actions/upload-artifact@v6
        with:
          name: image-tar-frontend
          path: /tmp/image-frontend.tar
          retention-days: 1
      # Sprint 168 ýőťŰôť #167-3: 3 build job ýŁś ýĄĹŰ│ÁýŁä ŰőĘýŁ╝ ÝŚČÝŹ╝Űíť ÝćÁÝĽę (services ýÖÇ ŰĆÖýŁ╝).
      - name: Report build artifact metrics
        run: bash scripts/ci/report-build-metrics.sh "frontend" "/tmp/image-frontend.tar" "/tmp/image-frontend-zstd.tar"

  # ============================================================
  # Build Blog ÔÇö ŕŞ░ýłá ŰŞöŰíťŕĚŞ ýáĽýáü ýéČýŁ┤ÝŐŞ (Next.js SSG + nginx)
  # ============================================================

  build-blog:
    name: Build Blog (SSG)
    needs: [detect-changes, secret-scan]
    if: |
      !cancelled() &&
      needs.detect-changes.outputs.blog == 'true' &&
      needs.secret-scan.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      # ---- host-side SSG Ű╣îŰôť ----
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: blog/package-lock.json
      - run: npm ci
        working-directory: blog
      - name: ADR conversion self-test
        working-directory: blog
        run: node ../scripts/check-adr-conversion.mjs
      - run: npm run build
        working-directory: blog
      - name: ADR link integrity
        # check-adr-links.mjsŰŐö ROOT(=repo root) ŕŞ░ýĄÇýť╝Űíť ýŁŞý×É ŕ▓ŻŰíťŰą╝ resolveÝĽśŰ»ÇŰíť
        # working-directory: blog ýĽłýŚÉýäťŰĆä `blog/out/adr` ýáłŰîÇ segmentŰą╝ Ű¬ůýőťÝĽ┤ýĽ╝ ÝĽťŰőĄ.
        # (Sprint 157 hotfix #3 ÔÇö ýžäýžť ŕĚ╝Ű│Ş ýŤÉýŁŞýŁ┤ýŚłýŁî. #1/#2ŰŐö ŰČ┤ŕ┤Ç)
        run: node scripts/check-adr-links.mjs blog/out/adr

      # ---- Docker ýŁ┤Ű»ŞýžÇ Ű╣îŰôť (COPY only) ----
      - uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Sprint 167 ýőťŰôť #165-2 + Sprint 166 D1: build duration ýŞíýáĽýÜę ýőťý×Ĺ ýőťŕ░ü ŕŞ░ŰíŁ.
      - name: Record build start time
        run: echo "BUILD_START=$(date +%s)" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v7
        with:
          context: ./blog
          platforms: linux/arm64
          # Sprint 165 ýśÁýůś C: multi-output (main ÝĹŞýőť + ÝĽşýâü docker tarball)
          # Sprint 168 ýőťŰôť #167-1 ý▒äÝâŁ: zstd ýáäŰę┤ ýáüýÜę (blog ÝĆČÝĽĘ)
          outputs: |
            type=image,push=${{ github.ref == 'refs/heads/main' }},name=${{ env.IMAGE_PREFIX }}-blog:main-${{ github.sha }}
            type=docker,dest=/tmp/image-blog.tar
            type=oci,compression=zstd,dest=/tmp/image-blog-zstd.tar
          build-args: APK_CACHE_BUST=${{ env.APK_BUST_VALUE }}
          cache-from: type=gha,scope=blog
          cache-to: type=gha,mode=max,scope=blog
      - name: Upload image tarball for Trivy scan
        uses: actions/upload-artifact@v6
        with:
          name: image-tar-blog
          path: /tmp/image-blog.tar
          retention-days: 1
      # Sprint 168 ýőťŰôť #167-3: 3 build job ýŁś ýĄĹŰ│ÁýŁä ŰőĘýŁ╝ ÝŚČÝŹ╝Űíť ÝćÁÝĽę (services ýÖÇ ŰĆÖýŁ╝).
      - name: Report build artifact metrics
        run: bash scripts/ci/report-build-metrics.sh "blog" "/tmp/image-blog.tar" "/tmp/image-blog-zstd.tar"

  # ============================================================
  # Trivy ÔÇö ýŁ┤Ű»ŞýžÇ ýĚĘýĽŻýáÉ ýŐĄý║ö (main push ÝŤä, deploy ýáä)
  # ============================================================

  trivy-scan:
    name: Trivy Scan ÔÇö ${{ matrix.service }}
    needs:
      - detect-changes
      - build-services
      - build-frontend
      - build-blog
    # Sprint 165 ýśÁýůś C: PR ŰőĘŕ│äýŚÉýäťŰĆä Trivy ýŐĄý║ö (tarball + --input)
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
          - service: identity
          - service: submission
          - service: problem
          - service: github-worker
          - service: ai-analysis
          - service: frontend
          - service: blog
    steps:
      - name: Check if service was built
        id: check
        run: |
          # detect-changes ŕ▓░ŕ│╝ýÖÇ build job ýä▒ŕ│Á ýŚČŰÂÇŰíť ÝîÉŰőĘ
          CHANGED="${{ needs.detect-changes.outputs[matrix.service] }}"
          BUILD_SVC="${{ needs.build-services.result }}"
          BUILD_FE="${{ needs.build-frontend.result }}"
          BUILD_BLOG="${{ needs.build-blog.result }}"

          if [ "${{ matrix.service }}" = "frontend" ]; then
            if [ "$BUILD_FE" != "success" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ matrix.service }}" = "blog" ]; then
            if [ "$BUILD_BLOG" != "success" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            # build-servicesŰŐö matrix jobýŁ┤Ű»ÇŰíť ýáäý▓┤ ŕ▓░ŕ│╝Űžî ÝÖĽýŁŞ ŕ░ÇŰŐą
            # changedŕ░Ç trueýŁ┤ŕ│á build-servicesŕ░Ç ýä▒ŕ│ÁýŁ┤Űę┤ ýőĄÝľë
            if [ "$CHANGED" != "true" ] || [ "$BUILD_SVC" != "success" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          fi
      - name: Checkout (for .trivyignore)
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v6
        with:
          sparse-checkout: .trivyignore
          sparse-checkout-cone-mode: false
      # Sprint 165 ýśÁýůś C: build job ýŁ┤ ýŚůŰíťŰôťÝĽť docker tarball ýŁä Ű░ŤýĽäýäť local scan
      - name: Download image tarball
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v6
        with:
          name: image-tar-${{ matrix.service }}
          path: /tmp
      - name: Install Trivy
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.69.2
      - name: Trivy scan (table)
        id: trivy_table
        if: steps.check.outputs.skip == 'false'
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --format table \
            --input /tmp/image-${{ matrix.service }}.tar
      - name: Trivy scan (SARIF)
        if: always() && steps.check.outputs.skip == 'false'
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --format sarif \
            --output trivy-results.sarif \
            --input /tmp/image-${{ matrix.service }}.tar
      # Sprint 165 Critic R1 P2 + R2 P2 fix: fork PR + same-repo Dependabot PR
      # Ű¬ĘŰĹÉ GITHUB_TOKEN ýŁ┤ read-only ŰŁ╝ security-events:write ý░ĘŰőĘŰÉĘ Ôćĺ
      # SARIF ýŚůŰíťŰôť ýőĄÝîĘ ýőť Ű│┤ýĽł ŕ▓îýŁ┤ÝŐŞýÖÇ ŰČ┤ŕ┤ÇÝĽť CI red ýľĹýé░ (Sprint 164
      # noisy red ÝîĘÝä┤ ý×ČŰ░ť ý░ĘŰőĘ). GitHub Docs "Dependabot on GitHub Actions"
      # ý░Şŕ│á ÔÇö same-repo Dependabot PR ŰĆä fork PR ŕ│╝ ŰĆÖýŁ╝ ŕÂîÝĽť ýáťýĽŻ.
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: >
          always() &&
          steps.check.outputs.skip == 'false' &&
          (github.event_name != 'pull_request' ||
           (github.event.pull_request.head.repo.full_name == github.repository &&
            github.event.pull_request.user.login != 'dependabot[bot]'))
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.service }}
      # Sprint 160 Phase B: deploy ŕ░Ç service Ű│ä trivy ŕ▓░ŕ│╝Űą╝ lookup ÝĽá ýłś ý×łŰĆäŰíŁ artifact ŕŞ░ŰíŁ
      # (Sprint 159 ÝÜîŕĚÇ: ai-analysis Trivy 1ŕ▒┤ fail ýŁ┤ frontend GitOps update ŕ╣îýžÇ ýáäý▓┤ SKIP ýőťÝéĘ Ű│Şýžł ý░ĘŰőĘ)
      - name: Record Trivy result for deploy gate
        if: always() && steps.check.outputs.skip == 'false'
        run: |
          mkdir -p trivy-status
          if [ "${{ steps.trivy_table.outcome }}" = "success" ]; then
            echo "pass" > trivy-status/${{ matrix.service }}.txt
          else
            echo "fail" > trivy-status/${{ matrix.service }}.txt
          fi
      - name: Upload Trivy status artifact
        if: always() && steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v6
        with:
          name: trivy-status-${{ matrix.service }}
          path: trivy-status/
          retention-days: 1

  # ============================================================
  # Deploy ÔÇö aether-gitops ýŁ┤Ű»ŞýžÇ ÝâťŕĚŞ ýŚůŰŹ░ýŁ┤ÝŐŞ (ArgoCD ý×ÉŰĆÖ sync)
  # ============================================================

  deploy:
    name: Update GitOps manifests
    needs:
      - secret-scan
      - detect-changes
      - trivy-scan
      - build-services
      - build-frontend
      - build-blog
    # main ŰŞîŰ×ťý╣ś + ÝĽśŰéś ýŁ┤ýâüýŁś ýäťŰ╣äýŐĄ Ű╣îŰôť ýä▒ŕ│Á ýőťýŚÉŰžî ýőĄÝľë
    # Sprint 160 Phase B: trivy-scan aggregated result ŕ░ÇŰôť ýáťŕ▒░ (Sprint 159 ÝÜîŕĚÇ ý░ĘŰőĘ).
    # ÝĽť service Trivy fail ýŁ┤ ýáä service GitOps update Űą╝ ŰžëýžÇ ýĽŐŰĆäŰíŁ, ŕ░ÇŰôťŰŐö build job ŕ▓░ŕ│╝Űžî ÝÖĽýŁŞ.
    # ýőĄýáť service Ű│ä Trivy ŕ▓░ŕ│╝ŰŐö ýĽäŰ×ś "Filter Trivy-failed services" step ýŚÉýäť artifact Űíť lookup.
    if: |
      github.ref == 'refs/heads/main' && !cancelled() &&
      needs.secret-scan.result == 'success' &&
      (needs.build-services.result == 'success' ||
       needs.build-frontend.result == 'success' ||
       needs.build-blog.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    # Sprint 160 Phase C: notify job ýŁ┤ service Ű│ä deploy/skip ŕ▓░ŕ│╝Űą╝ ÝÖťýÜęÝĽá ýłś ý×łŰĆäŰíŁ ŰůŞýÂť
    # (ýőťŰôť #ýőáŕĚť4: "git merge ýä▒ŕ│Á + ýŁ╝ŰÂÇ service deploy ý░ĘŰőĘ" ý╝ÇýŁ┤ýŐĄ Ű¬ůýőťýáü ŰÂäŰŽČ)
    outputs:
      updated: ${{ steps.update_tags.outputs.updated }}
      skipped_trivy: ${{ steps.update_tags.outputs.skipped_trivy }}
    steps:
      - name: Clone aether-gitops
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/tpals0409/aether-gitops.git
          cd aether-gitops
          git config user.name "algosu-ci"
          git config user.email "ci@algosu.dev"

      # Sprint 160 Phase B: trivy-scan matrix ýŁś service Ű│ä ŕ▓░ŕ│╝Űą╝ artifact Űíť ýłśýžĹ
      # (pattern + merge-multiple Űíť ÝĽť ŰööŰáëÝćáŰŽČýŚÉ ÝĆëÝâäÝÖö ÔÇö `trivy-status/<service>.txt`)
      - name: Download Trivy status artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: trivy-status-*
          path: trivy-status
          merge-multiple: true

      - name: Probe Trivy status artifacts (Sprint 157 ýőťŰôť #29)
        run: |
          echo "::group::trivy-status directory"
          ls -la trivy-status/ 2>/dev/null || echo "(empty ÔÇö no service was scanned)"
          for f in trivy-status/*.txt; do
            [ -f "$f" ] && echo "  $(basename "$f" .txt): $(cat "$f")"
          done
          echo "::endgroup::"

      - name: Update image tags for changed services
        id: update_tags
        run: |
          cd aether-gitops/algosu/overlays/prod
          SHA="${{ github.sha }}"
          STATUS_DIR="$GITHUB_WORKSPACE/trivy-status"
          CANDIDATES=""
          UPDATED=""
          SKIPPED_TRIVY=""

          # build job ýä▒ŕ│Á + detect-changes ŕ░Ç ÝÖťýä▒ÝÖöŰÉť ýäťŰ╣äýŐĄŰą╝ ÝŤäŰ│┤Űíť ýłśýžĹ
          if [ "${{ needs.build-services.result }}" = "success" ]; then
            [ "${{ needs.detect-changes.outputs.gateway }}" = "true" ] && CANDIDATES="${CANDIDATES} gateway"
            [ "${{ needs.detect-changes.outputs.identity }}" = "true" ] && CANDIDATES="${CANDIDATES} identity"
            [ "${{ needs.detect-changes.outputs.submission }}" = "true" ] && CANDIDATES="${CANDIDATES} submission"
            [ "${{ needs.detect-changes.outputs.problem }}" = "true" ] && CANDIDATES="${CANDIDATES} problem"
            [ "${{ needs.detect-changes.outputs.github-worker }}" = "true" ] && CANDIDATES="${CANDIDATES} github-worker"
            [ "${{ needs.detect-changes.outputs.ai-analysis }}" = "true" ] && CANDIDATES="${CANDIDATES} ai-analysis"
          fi
          [ "${{ needs.build-frontend.result }}" = "success" ] && CANDIDATES="${CANDIDATES} frontend"
          [ "${{ needs.build-blog.result }}" = "success" ] && CANDIDATES="${CANDIDATES} blog"

          # service Ű│ä Trivy ŕ▓░ŕ│╝ lookup Ôćĺ Ű¬ůýőťýáü "pass" Űžî ÝćÁŕ│╝ (fail-closed security gate)
          # (Sprint 159 ÝÜîŕĚÇ ý░ĘŰőĘ: ÝĽť service Trivy fail ýŁ┤ ŰőĄŰąŞ service GitOps update Űą╝ ŰžëýžÇ ýĽŐýŁî)
          # Critic R1 P1 ÝĽ┤ýćî: status file ŰłäŰŁŻ(infra fail / artifact upload ýőĄÝîĘ Űô▒) ý╝ÇýŁ┤ýŐĄŰĆä SKIPPED ŰÂäŰąś ÔÇö
          # missing/fail/ŕŞ░ÝâÇ = Ű¬ĘŰĹÉ ý░ĘŰőĘ, "pass" Űžî deploy. security gate ýÜ░ÝÜî Ű░ęýžÇ.
          for SVC in $CANDIDATES; do
            STATUS_FILE="${STATUS_DIR}/${SVC}.txt"
            STATUS=$(cat "$STATUS_FILE" 2>/dev/null || echo "missing")
            if [ "$STATUS" != "pass" ]; then
              SKIPPED_TRIVY="${SKIPPED_TRIVY} ${SVC}"
              echo "  ÔÜá algosu-${SVC} SKIPPED (Trivy status: ${STATUS} ÔÇö service-scoped security gate, ŰőĄŰąŞ service ŰŐö ýáĽýâü ýžäÝľë)"
              continue
            fi
            UPDATED="${UPDATED} ${SVC}"
          done

          # ÝćÁŕ│╝ÝĽť service Űžî ýŁ┤Ű»ŞýžÇ ÝâťŕĚŞ ýŚůŰŹ░ýŁ┤ÝŐŞ (python3 + PyYAML)
          for SVC in $UPDATED; do
            python3 -c "
          import yaml
          with open('kustomization.yaml', 'r') as f:
              data = yaml.safe_load(f)
          for img in data.get('images', []):
              if 'algosu-${SVC}' in img.get('name', ''):
                  img['newTag'] = 'main-${SHA}'
          with open('kustomization.yaml', 'w') as f:
              yaml.dump(data, f, default_flow_style=False, sort_keys=False)
          "
            echo "  Ôťô algosu-${SVC} Ôćĺ main-${SHA}"
          done

          echo "Updated services:${UPDATED}"
          echo "Skipped (Trivy fail):${SKIPPED_TRIVY}"
          # Phase C ýĽîŰŽ╝ ŕ░ĽÝÖöýÜę outputs
          echo "updated=${UPDATED}" >> $GITHUB_OUTPUT
          echo "skipped_trivy=${SKIPPED_TRIVY}" >> $GITHUB_OUTPUT
          cat kustomization.yaml

      - name: Commit and push to aether-gitops
        id: push_gitops
        run: |
          cd aether-gitops
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add -A
          git commit -m "deploy(algosu): update image tags Ôćĺ main-${{ github.sha }}"
          git push

      # Sprint 160 Phase C: deploy ŕ▓░ŕ│╝Űą╝ GitHub Step Summary ýŚÉ markdown ýť╝Űíť ŰůŞýÂť
      # (ýőťŰôť #ýőáŕĚť4: "git merge ýä▒ŕ│Á" ÝŤäýŚÉŰĆä ýŁ╝ŰÂÇ service ŕ░Ç SKIPPED ŰÉť ŕ▓ŻýÜ░ ÝĽť ÝÄśýŁ┤ýžÇýŚÉýäť ŕ░ÇýőťÝÖö)
      # Critic R1 P2 ÝĽ┤ýćî: push fail ýőť "Deployed services" ŕ▒░ýžô ýä▒ŕ│Á ýÂťŰáą ý░ĘŰőĘ ÔÇö
      # steps.push_gitops.outcome ŕŞ░ýĄÇýť╝Űíť "Deployed" vs "candidates (push failed)" ŰÂäŕŞ░
      - name: Surface deploy summary
        if: always()
        run: |
          UPDATED="${{ steps.update_tags.outputs.updated }}"
          SKIPPED="${{ steps.update_tags.outputs.skipped_trivy }}"
          PUSH_OUTCOME="${{ steps.push_gitops.outcome }}"
          {
            echo "## Deploy summary ÔÇö commit \`${{ github.sha }}\`"
            echo ""
            if [ -n "$UPDATED" ]; then
              if [ "$PUSH_OUTCOME" = "success" ]; then
                echo "### Ôťů Deployed services"
                for SVC in $UPDATED; do
                  echo "- \`$SVC\` Ôćĺ \`main-${{ github.sha }}\`"
                done
              else
                echo "### ­čÜź GitOps push failed (push step outcome: \`${PUSH_OUTCOME}\`)"
                echo "Tags were edited in the local clone but **NOT propagated to aether-gitops**. The following services are *candidates only* ÔÇö production is unchanged:"
                for SVC in $UPDATED; do
                  echo "- \`$SVC\` ÔÇö intended tag: \`main-${{ github.sha }}\` (NOT applied)"
                done
                echo ""
                echo "> ÔÜá´ŞĆ Investigate \`Commit and push to aether-gitops\` step + GITOPS_TOKEN scope. Manual aether-gitops PR may be required as forward-fix."
              fi
            else
              echo "### ÔÜá´ŞĆ No services were deployed (no candidate matched build + detect-changes)"
            fi
            if [ -n "$SKIPPED" ]; then
              echo ""
              echo "### ­čÜź SKIPPED (Trivy fail or status missing)"
              for SVC in $SKIPPED; do
                echo "- \`$SVC\` ÔÇö production tag NOT advanced. Investigate \`Trivy Scan ÔÇö $SVC\` job + base image / dependency CVEs."
              done
              echo ""
              echo "> ÔÜá´ŞĆ **\"git merge ýä▒ŕ│Á\" Ôëá \"deploy ýä▒ŕ│Á\"** ÔÇö Sprint 159 ÝÜîŕĚÇ ýőťŰéśŰŽČýśĄ ý×ČŰ░ť Ű░ęýžÇ ýĽîŰŽ╝. forward-fix ŰśÉŰŐö base image ÝîĘý╣ś PR ÝĽäýÜö."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # Notify ÔÇö Ű░░ÝĆČ ŕ▓░ŕ│╝ Grafana Annotation
  # ============================================================

  notify:
    name: Deploy Notification
    needs: deploy
    if: always() && needs.deploy.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Grafana deployment annotation
        if: needs.deploy.result == 'success'
        run: |
          # Grafanaŕ░Ç k3s Űé┤ŰÂÇýŚÉýäť ýőĄÝľëŰÉśŰ»ÇŰíť Űíťý╗Č ýáĹŕĚ╝ ŰÂłŕ░Ç
          # ArgoCD sync ÝŤä Ű░░ÝĆČ ýäťŰ▓äýŚÉýäť annotation ýâŁýä▒ÝĽśŰĆäŰíŁ aether-gitopsýŚÉ ŕŞ░ŰíŁ
          echo "Grafana annotation will be created by ArgoCD post-sync hook"
          echo "Deploy SHA: ${{ github.sha }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      # Sprint 160 Phase C: Trivy fail/missing ýť╝Űíť SKIPPED ŰÉť service ŕ░Ç ý×łýŁä ŰĽî Ű¬ůýőťýáü warning
      # (Sprint 159 ýőťŰôť #ýőáŕĚť4: deploy pipeline ý░ĘŰőĘ ýĽîŰŽ╝ ŕ░ĽÝÖö)
      - name: Warn on Trivy-skipped services
        if: needs.deploy.outputs.skipped_trivy != ''
        run: |
          SKIPPED="${{ needs.deploy.outputs.skipped_trivy }}"
          echo "::warning::Deploy ŰÂÇŰÂä ý░ĘŰőĘ ÔÇö Trivy fail/missing ýť╝Űíť SKIPPED ŰÉť service:$SKIPPED"
          echo "::warning::production ýŁś ÝĽ┤Űő╣ service ýŁ┤Ű»ŞýžÇŰŐö \`main-${{ github.sha }}\` ýť╝Űíť advance ŰÉśýžÇ ýĽŐýĽśýŐÁŰőłŰőĄ."
          echo "::warning::Sprint 159 ý×ČŰ░ť Ű░ęýžÇ ÔÇö 'ŰęöýŁŞ ŰĘŞýžÇ ýä▒ŕ│Á' ŰęöýőťýžÇŰžî Ű│┤ŕ│á deploy ýÖäŰúîŰíť ŕ░ÇýáĽÝĽśýžÇ ŰžłýäŞýÜö. ýéČÝŤä forward-fix ÝĽäýÜö."

  # ============================================================
  # E2E: Programmers Full Flow ÔÇö sourcePlatform ýáäŰőČ ŕ▓ÇýŽŁ (PR ý×ÉŰĆÖ ýőĄÝľë)
  #
  # Ű▓öýťä: GitHub Worker ÝîîýŁ╝ ŕ▓ŻŰíť + MQ ýŁ┤Ű▓ĄÝŐŞ ŕ│äýĽŻ + AI ÝöäŰíČÝöäÝŐŞ ŰžąŰŁŻ
  # ýÖŞŰÂÇ ýŁśýí┤: GitHub API(Octokit stub), Claude API(ÝśŞýÂť ýŚćýŁî) ÔÇö 0ŕ▒┤
  # ýőĄÝľë: Ű¬ĘŰôá PR + push on main (Sprint 141 ýáĽÝĽę ÔÇö `github.event_name == 'pull_request'`Űíť PR ŰČ┤ýí░ŕ▒┤ ýőĄÝľë Ű│┤ý×ą)
  # Python 3.12 ýéČýÜę: str|None ýťáŰőłýľŞ ŰČŞŰ▓Ľ ýžÇýŤÉ
  # ============================================================

  e2e-programmers:
    name: E2E ÔÇö Programmers Full Flow
    needs:
      - detect-changes
      - secret-scan
    if: |
      !cancelled() &&
      needs.secret-scan.result == 'success' &&
      (
        needs.detect-changes.outputs.github-worker == 'true' ||
        needs.detect-changes.outputs.ai-analysis == 'true' ||
        github.event_name == 'pull_request'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # ÔöÇÔöÇ Node.js (GitHub Worker E2E ýŁśýí┤ýä▒ ýäĄý╣śýÜę) ÔöÇÔöÇ
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ÔöÇÔöÇ Python 3.12 (AI ŰÂäýäŁ ÝöäŰíČÝöäÝŐŞ subprocess ŕ▓ÇýŽŁ) ÔöÇÔöÇ
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache E2E node_modules
        uses: actions/cache@v5
        id: cache-e2e-node
        with:
          path: tests/e2e/node_modules
          key: node-e2e-${{ hashFiles('tests/e2e/package-lock.json') }}
          restore-keys: node-e2e-

      - name: Cache github-worker node_modules
        uses: actions/cache@v5
        id: cache-gw-node
        with:
          path: services/github-worker/node_modules
          key: node-github-worker-${{ hashFiles('services/github-worker/package-lock.json') }}
          restore-keys: node-github-worker-

      - name: Cache pip (ai-analysis)
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-e2e-${{ hashFiles('services/ai-analysis/requirements.txt') }}
          restore-keys: pip-e2e-

      - name: Install E2E dependencies
        if: steps.cache-e2e-node.outputs.cache-hit != 'true'
        working-directory: tests/e2e
        run: npm ci

      - name: Install github-worker dependencies
        if: steps.cache-gw-node.outputs.cache-hit != 'true'
        working-directory: services/github-worker
        run: npm ci

      - name: Install ai-analysis Python dependencies
        working-directory: services/ai-analysis
        run: pip install -r requirements.txt

      - name: Run E2E ÔÇö Programmers Full Flow
        working-directory: tests/e2e
        env:
          NODE_ENV: test
          PYTHON_BIN: python3
        run: npm test -- --ci --verbose --no-coverage

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-programmers-results
          path: tests/e2e/
          retention-days: 7

  # ============================================================
  # E2E Test ÔÇö ýáäý▓┤ ýäťŰ╣äýŐĄ ÝćÁÝĽę ÝůîýŐĄÝŐŞ (ýłśŰĆÖ ÝŐŞŰŽČŕ▒░ + ŰŁ╝Ű▓Ę ÝŐŞŰŽČŕ▒░)
  #
  # ýőĄÝľë ýí░ŕ▒┤ (Sprint 141 ÔÇö ŰŁ╝Ű▓Ę ŕŞ░Ű░ś PR ÝŐŞŰŽČŕ▒░ ýÂöŕ░Ç):
  # 1. workflow_dispatch (rebuild_all ýáťýÖŞ)
  # 2. PRýŚÉ `run-e2e-full` ŰŁ╝Ű▓Ę ŰÂÇý░ę ýőť ý×ÉŰĆÖ ýőĄÝľë (Ýü░ Ű│Çŕ▓ŻýŚÉ ÝĽťýáĽ Ű¬ůýőť ÝŐŞŰŽČŕ▒░)
  # docker-compose ŕŞ░Ű░ś ýŁŞÝöäŰŁ╝ + ýáä ýäťŰ╣äýŐĄ ŕŞ░ŰĆÖ ÝŤä e2e-full.sh ýőĄÝľë.
  # PRŰžłŰőĄ ŰČ┤ýí░ŕ▒┤ ýőĄÝľëýŁÇ Ű╣äýÜę/ýőťŕ░ä ŰÂÇŰő┤ Ôćĺ opt-in ýáĽý▒ů.
  # ============================================================

  e2e-test:
    name: E2E Integration Test
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.rebuild_all != 'true') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e-full'))
    needs:
      - test-node
      - test-ai-analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Comment PR ÔÇö E2E ýőťý×Ĺ
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `­čž¬ **E2E Integration Test ýžäÝľë ýĄĹ**\n\n[ýŤîÝüČÝöîŰíťýÜ░ ýőĄÝľë Ű│┤ŕŞ░](${runUrl})`
            });

      - name: Start infrastructure services
        run: |
          docker compose -f docker-compose.dev.yml up -d
          echo "Waiting for infrastructure services to be healthy..."
          docker compose -f docker-compose.dev.yml ps
        env:
          POSTGRES_ROOT_PASSWORD: e2e_test_password
          REDIS_PASSWORD: e2e_test_redis
          RABBITMQ_USER: e2e_user
          RABBITMQ_PASSWORD: e2e_test_rabbitmq

      - name: Wait for infrastructure readiness
        run: |
          # PostgreSQL
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.dev.yml exec -T postgres pg_isready -U algosu_root 2>/dev/null; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

          # Redis
          for i in $(seq 1 20); do
            if docker compose -f docker-compose.dev.yml exec -T redis redis-cli -a e2e_test_redis ping 2>/dev/null | grep -q PONG; then
              echo "Redis is ready"
              break
            fi
            echo "Waiting for Redis... ($i/20)"
            sleep 2
          done

          # RabbitMQ
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.dev.yml exec -T rabbitmq rabbitmq-diagnostics ping 2>/dev/null; then
              echo "RabbitMQ is ready"
              break
            fi
            echo "Waiting for RabbitMQ... ($i/30)"
            sleep 2
          done
        env:
          POSTGRES_ROOT_PASSWORD: e2e_test_password
          REDIS_PASSWORD: e2e_test_redis
          RABBITMQ_USER: e2e_user
          RABBITMQ_PASSWORD: e2e_test_rabbitmq

      - name: Run E2E tests
        run: |
          chmod +x scripts/e2e-full.sh
          ./scripts/e2e-full.sh
        env:
          GATEWAY_URL: http://localhost:3000

      - name: Collect service logs on failure
        if: failure()
        run: |
          echo "=== Docker Compose Logs ==="
          docker compose -f docker-compose.dev.yml logs --tail=100
        env:
          POSTGRES_ROOT_PASSWORD: e2e_test_password
          REDIS_PASSWORD: e2e_test_redis
          RABBITMQ_USER: e2e_user
          RABBITMQ_PASSWORD: e2e_test_rabbitmq

      - name: Upload logs artifact on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-logs
          path: /tmp/e2e-logs/
          retention-days: 7

      - name: Comment PR ÔÇö E2E ýőĄÝîĘ
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `ÔŁî **E2E Integration Test ýőĄÝîĘ**\n\n[ýőĄÝîĘ ŰíťŕĚŞ ÝÖĽýŁŞ](${runUrl})\n\nArtifact \`e2e-logs\`ýŚÉýäť ýâüýäŞ ŰíťŕĚŞŰą╝ ŰőĄýÜ┤ŰíťŰôťÝĽá ýłś ý×łýŐÁŰőłŰőĄ.`
            });

      - name: Teardown infrastructure
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
        env:
          POSTGRES_ROOT_PASSWORD: e2e_test_password
          REDIS_PASSWORD: e2e_test_redis
          RABBITMQ_USER: e2e_user
          RABBITMQ_PASSWORD: e2e_test_rabbitmq
