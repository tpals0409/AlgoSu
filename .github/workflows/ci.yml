# ============================================================
# AlgoSu — GitHub Actions CI 파이프라인
#
# 규칙:
#   - path filter로 변경된 서비스만 테스트+빌드 (비용 절감)
#   - 테스트 통과 후에만 Docker 빌드 진행
#   - ARM aarch64 이미지 빌드 (OCI Free Tier: VM.Standard.A1.Flex)
#   - GHCR 푸시 태그: main-{git-sha} (latest 태그 절대 금지)
# ============================================================

name: CI — Test, Build & Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Force rebuild all services'
        required: false
        default: 'false'
      apk_bust:
        description: 'Force APK cache bust (apk upgrade 재실행)'
        required: false
        default: 'false'

# 최소 권한 원칙: 기본 제로, 각 job에서 필요 권한만 명시
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/algosu
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  APK_BUST_VALUE: ${{ github.event.inputs.apk_bust == 'true' && github.run_id || 'stable' }}

jobs:
  # ============================================================
  # Security Scan — 시크릿 유출 + .env 커밋 방지 (모든 push/PR에 실행)
  # ============================================================

  secret-scan:
    name: Secret & Env Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks secret scan
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --verbose
          else
            gitleaks detect --source . --config .gitleaks.toml --verbose
          fi

      - name: Reject committed .env files
        run: |
          # Git 인덱스 내 .env 파일 탐지 (.env.example 제외)
          VIOLATIONS=$(git ls-files | grep -E '(^|/)\.env($|\..*)' | grep -v '\.env\.example' || true)

          # PR인 경우: 변경 파일 중 .env 추가 탐지
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_ENV=$(git diff --name-only "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              | grep -E '(^|/)\.env($|\..*)' | grep -v '\.env\.example' || true)
            [ -n "$PR_ENV" ] && VIOLATIONS="$VIOLATIONS $PR_ENV"
          fi

          if [ -n "$(echo "$VIOLATIONS" | tr -d ' ')" ]; then
            echo "::error::SECURITY VIOLATION: .env files detected in Git"
            echo "위반 파일: $VIOLATIONS"
            echo "조치: git rm --cached <파일명> 후 .gitignore 확인"
            exit 1
          fi

          echo "env-check: PASS"

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      gateway:       ${{ steps.result.outputs.gateway }}
      identity:      ${{ steps.result.outputs.identity }}
      submission:    ${{ steps.result.outputs.submission }}
      problem:       ${{ steps.result.outputs.problem }}
      github-worker: ${{ steps.result.outputs.github-worker }}
      ai-analysis:   ${{ steps.result.outputs.ai-analysis }}
      frontend:      ${{ steps.result.outputs.frontend }}
      blog:          ${{ steps.result.outputs.blog }}
      monitoring:    ${{ steps.result.outputs.monitoring }}
      docs:          ${{ steps.result.outputs.docs }}
      ci-scripts:    ${{ steps.result.outputs.ci-scripts }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            gateway:
              - 'services/gateway/**'
              - 'scripts/ci/report-build-metrics.sh'
            identity:
              - 'services/identity/**'
              - 'scripts/ci/report-build-metrics.sh'
            submission:
              - 'services/submission/**'
              - 'scripts/ci/report-build-metrics.sh'
            problem:
              - 'services/problem/**'
              - 'scripts/ci/report-build-metrics.sh'
            github-worker:
              - 'services/github-worker/**'
              - 'scripts/ci/report-build-metrics.sh'
            ai-analysis:
              - 'services/ai-analysis/**'
              - 'scripts/ci/report-build-metrics.sh'
            frontend:
              - 'frontend/**'
              - 'scripts/ci/report-build-metrics.sh'
            blog:
              - 'blog/**'
              # Sprint 175 #26: blog SSG 가 실제 소비하는 ADR 소스만 트리거 (소비처 일치 원칙).
              # loader.ts(DIR_KIND_MAP) + generate-search-index.mjs 는 루트 ADR-*.md + sprints/ + topics/ 만
              # 읽고 docs/adr/README.md(인덱스)는 명시적 제외 → README 단독 변경 시 불필요한 blog 재빌드 회피.
              # dorny/paths-filter 는 predicate-quantifier:some(OR) 이라 '!' 부정 패턴이 무력화되므로
              # 부정 대신 positive glob narrowing 으로 README 를 트리거 집합에서 제외한다.
              - 'docs/adr/ADR-*.md'
              - 'docs/adr/sprints/**'
              - 'docs/adr/topics/**'
              - 'scripts/ci/report-build-metrics.sh'
            monitoring:
              - 'infra/k3s/monitoring/**'
              - 'scripts/check-prometheus-rules.mjs'
              - 'scripts/check-grafana-metrics.mjs'
              - 'scripts/check-regex-robustness.mjs'
              - 'services/**/metrics.service.ts'
              - 'services/**/metrics.ts'
              - 'services/**/metrics.py'
              - 'services/submission/src/common/circuit-breaker/circuit-breaker.service.ts'
              - 'services/github-worker/src/circuit-breaker.ts'
              - 'services/problem/src/database/dual-write.service.ts'
            docs:
              - 'docs/**/*.md'
              - '*.md'
              - '.claude/commands/**/*.md'
              - 'blog/content/**/*.mdx'
              - 'scripts/check-doc-refs.mjs'
              - 'scripts/check-adr-en-coverage.mjs'
            ci-scripts:
              - 'scripts/ci/**'
              - 'tests/ci/**'
      - name: Apply rebuild_all override
        id: result
        run: |
          if [ "${{ github.event.inputs.rebuild_all }}" = "true" ]; then
            echo "gateway=true" >> $GITHUB_OUTPUT
            echo "identity=true" >> $GITHUB_OUTPUT
            echo "submission=true" >> $GITHUB_OUTPUT
            echo "problem=true" >> $GITHUB_OUTPUT
            echo "github-worker=true" >> $GITHUB_OUTPUT
            echo "ai-analysis=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "blog=true" >> $GITHUB_OUTPUT
            echo "monitoring=true" >> $GITHUB_OUTPUT
            echo "docs=true" >> $GITHUB_OUTPUT
            echo "ci-scripts=true" >> $GITHUB_OUTPUT
          else
            echo "gateway=${{ steps.filter.outputs.gateway }}" >> $GITHUB_OUTPUT
            echo "identity=${{ steps.filter.outputs.identity }}" >> $GITHUB_OUTPUT
            echo "submission=${{ steps.filter.outputs.submission }}" >> $GITHUB_OUTPUT
            echo "problem=${{ steps.filter.outputs.problem }}" >> $GITHUB_OUTPUT
            echo "github-worker=${{ steps.filter.outputs.github-worker }}" >> $GITHUB_OUTPUT
            echo "ai-analysis=${{ steps.filter.outputs.ai-analysis }}" >> $GITHUB_OUTPUT
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> $GITHUB_OUTPUT
            echo "blog=${{ steps.filter.outputs.blog }}" >> $GITHUB_OUTPUT
            echo "monitoring=${{ steps.filter.outputs.monitoring }}" >> $GITHUB_OUTPUT
            echo "docs=${{ steps.filter.outputs.docs }}" >> $GITHUB_OUTPUT
            echo "ci-scripts=${{ steps.filter.outputs.ci-scripts }}" >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # Commit Lint — PR 시 Conventional Commits 강제
  # ============================================================

  commit-lint:
    name: Lint Commit Messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  # ============================================================
  # Quality Gate — lint + typecheck (변경된 서비스만)
  # ============================================================

  quality-nestjs:
    name: Quality — ${{ matrix.service }}
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
            has_eslint: 'true'
            lint_glob: '{src,test}/**/*.ts'
          - service: identity
            changed: ${{ needs.detect-changes.outputs.identity }}
            has_eslint: 'true'
            lint_glob: '{src,test}/**/*.ts'
          - service: submission
            changed: ${{ needs.detect-changes.outputs.submission }}
            has_eslint: 'true'
            lint_glob: '{src,test}/**/*.ts'
          - service: problem
            changed: ${{ needs.detect-changes.outputs.problem }}
            has_eslint: 'true'
            lint_glob: '{src,test}/**/*.ts'
          - service: github-worker
            changed: ${{ needs.detect-changes.outputs.github-worker }}
            has_eslint: 'true'
            lint_glob: 'src/**/*.ts'
    steps:
      - name: Skip if not changed
        id: check
        run: |
          if [ "${{ matrix.changed }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'
      # --- Composite action ---
      - name: Setup Node service (composite)
        if: steps.check.outputs.skip == 'false'
        uses: ./.github/actions/setup-node-service
        with:
          service-path: services/${{ matrix.service }}
          node-version: ${{ env.NODE_VERSION }}
      - name: ESLint
        if: steps.check.outputs.skip == 'false' && matrix.has_eslint == 'true'
        working-directory: services/${{ matrix.service }}
        run: npx eslint "${{ matrix.lint_glob }}"
      - name: TypeScript typecheck
        if: steps.check.outputs.skip == 'false'
        working-directory: services/${{ matrix.service }}
        run: npx tsc --noEmit
      - name: Check mock factory coverage
        if: steps.check.outputs.skip == 'false' && matrix.service == 'submission'
        run: node scripts/check-mock-coverage.mjs

  quality-python:
    name: Quality — ai-analysis
    needs: detect-changes
    if: needs.detect-changes.outputs.ai-analysis == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-ruff-${{ env.PYTHON_VERSION }}
          restore-keys: |
            pip-ruff-
            pip-
      - name: Install ruff
        run: pip install ruff
      - name: ruff lint
        working-directory: services/ai-analysis
        run: ruff check src/
      - name: ruff format check
        working-directory: services/ai-analysis
        run: ruff format --check src/

  quality-monitoring:
    name: Quality — monitoring
    needs: detect-changes
    if: needs.detect-changes.outputs.monitoring == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install promtool
        run: |
          PROM_VERSION=2.55.0
          curl -sSfL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" \
            | tar xz
          sudo mv "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/
          rm -rf "prometheus-${PROM_VERSION}.linux-amd64"
          promtool --version
      - name: Check prometheus rules syntax
        run: node scripts/check-prometheus-rules.mjs
      - name: Check grafana dashboard metrics ↔ service code
        run: node scripts/check-grafana-metrics.mjs
      - name: Check regex robustness in scripts
        run: node scripts/check-regex-robustness.mjs

  quality-docs:
    name: Quality — docs
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Check doc cross-refs
        run: node scripts/check-doc-refs.mjs
      - name: Check ADR EN coverage (strict)
        run: node scripts/check-adr-en-coverage.mjs --strict

  # ============================================================
  # Quality — CI shell helper 단위 테스트 (Sprint 169 시드 #168-4)
  # scripts/ci/** 또는 tests/ci/** 변경 시 report-build-metrics.sh 회귀 차단
  # ============================================================

  quality-ci-scripts:
    name: Quality — ci-scripts
    needs: detect-changes
    if: needs.detect-changes.outputs.ci-scripts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run report-build-metrics.sh unit tests
        run: bash tests/ci/report-build-metrics-test.sh
      - name: Run compute-deploy-gate.sh unit tests
        run: bash tests/ci/compute-deploy-gate-test.sh

  quality-frontend:
    name: Quality — frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-node
        with:
          path: frontend/node_modules
          key: node-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            node-frontend-
      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm ci
      - name: next lint
        working-directory: frontend
        run: npx next lint
      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit

  # ============================================================
  # npm audit — 의존성 보안 취약점 스캔 (high/critical 차단)
  # ============================================================

  audit-npm:
    name: Audit — ${{ matrix.service }}
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
            work_dir: services/gateway
          - service: identity
            changed: ${{ needs.detect-changes.outputs.identity }}
            work_dir: services/identity
          - service: submission
            changed: ${{ needs.detect-changes.outputs.submission }}
            work_dir: services/submission
          - service: problem
            changed: ${{ needs.detect-changes.outputs.problem }}
            work_dir: services/problem
          - service: github-worker
            changed: ${{ needs.detect-changes.outputs.github-worker }}
            work_dir: services/github-worker
          - service: frontend
            changed: ${{ needs.detect-changes.outputs.frontend }}
            work_dir: frontend
    steps:
      - name: Skip if not changed
        id: check
        run: |
          if [ "${{ matrix.changed }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'
      # --- Composite action ---
      - name: Setup Node service (composite)
        if: steps.check.outputs.skip == 'false'
        uses: ./.github/actions/setup-node-service
        with:
          service-path: ${{ matrix.work_dir }}
          node-version: ${{ env.NODE_VERSION }}
          install-command: 'npm ci --ignore-scripts'
      - name: npm audit (high/critical)
        if: steps.check.outputs.skip == 'false'
        working-directory: ${{ matrix.work_dir }}
        run: npm audit --audit-level=critical --omit=dev

  # ============================================================
  # Test Jobs — Quality Gate 통과 후에만 테스트 진행
  # ============================================================

  test-node:
    name: Test ${{ matrix.name }}
    needs: [detect-changes, quality-nestjs]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            name: Gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
            test_args: '--coverage --ci'
            work_dir: services/gateway
          - service: identity
            name: Identity
            changed: ${{ needs.detect-changes.outputs.identity }}
            test_args: '--coverage --ci --passWithNoTests'
            work_dir: services/identity
          - service: submission
            name: Submission
            changed: ${{ needs.detect-changes.outputs.submission }}
            test_args: '--coverage --ci --forceExit'
            work_dir: services/submission
          - service: problem
            name: Problem
            changed: ${{ needs.detect-changes.outputs.problem }}
            test_args: '--coverage --ci'
            work_dir: services/problem
          - service: github-worker
            name: GitHub Worker
            changed: ${{ needs.detect-changes.outputs.github-worker }}
            test_args: '--coverage --ci'
            work_dir: services/github-worker
    steps:
      - name: Skip if not changed
        id: check
        run: |
          if [ "${{ matrix.changed }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'
      # --- Composite action ---
      - name: Setup Node service (composite)
        if: steps.check.outputs.skip == 'false'
        uses: ./.github/actions/setup-node-service
        with:
          service-path: ${{ matrix.work_dir }}
          node-version: ${{ env.NODE_VERSION }}
      - name: Run unit tests
        if: steps.check.outputs.skip == 'false'
        working-directory: ${{ matrix.work_dir }}
        run: npm test -- ${{ matrix.test_args }}
      - name: Upload coverage
        if: always() && steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.work_dir }}/coverage/
          retention-days: 7

  test-ai-analysis:
    name: Test AI Analysis
    needs: [detect-changes, quality-python]
    if: needs.detect-changes.outputs.ai-analysis == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v5
        id: cache-pip
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('services/ai-analysis/requirements*.txt') }}
          restore-keys: |
            pip-
      - name: Install dependencies
        working-directory: services/ai-analysis
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests
        working-directory: services/ai-analysis
        run: python -m pytest tests/ -v --cov=src --cov-report=xml --cov-report=lcov:coverage/lcov.info
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-ai-analysis
          path: |
            services/ai-analysis/coverage.xml
            services/ai-analysis/coverage/lcov.info
          retention-days: 7

  test-frontend:
    name: Test Frontend
    needs: [detect-changes, quality-frontend]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-node
        with:
          path: frontend/node_modules
          key: node-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            node-frontend-
      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm ci
      - name: Run unit tests
        working-directory: frontend
        run: npm test -- --ci --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 7

  # ============================================================
  # Coverage Gate — 글로벌 60% 임계치 강제 (Node + AI Analysis + Frontend)
  # ============================================================

  coverage-gate:
    name: Coverage Gate
    needs: [test-node, test-ai-analysis, test-frontend]
    if: >-
      always() &&
      !cancelled() &&
      (needs.test-node.result == 'success' || needs.test-node.result == 'skipped') &&
      (needs.test-ai-analysis.result == 'success' || needs.test-ai-analysis.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: scripts/check-coverage.mjs
          sparse-checkout-cone-mode: false

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage/
          merge-multiple: false

      - name: Check coverage threshold
        id: coverage
        run: node scripts/check-coverage.mjs coverage/ 70

      - name: Comment PR with coverage
        if: always() && github.event_name == 'pull_request' && steps.coverage.outputs.coverage-body != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          message: ${{ steps.coverage.outputs.coverage-body }}

  # ============================================================
  # Build Jobs — 테스트 통과 후 Docker 빌드 + GHCR 푸시
  # ============================================================

  build-services:
    name: Build ${{ matrix.name }}
    needs: [detect-changes, test-node, test-ai-analysis, audit-npm, secret-scan]
    if: |
      !cancelled() &&
      (needs.test-node.result == 'success' || needs.test-node.result == 'skipped') &&
      (needs.test-ai-analysis.result == 'success' || needs.test-ai-analysis.result == 'skipped') &&
      (needs.audit-npm.result == 'success' || needs.audit-npm.result == 'skipped') &&
      needs.secret-scan.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            name: Gateway (NestJS)
            changed: ${{ needs.detect-changes.outputs.gateway }}
            context: ./services/gateway
          - service: identity
            name: Identity Service (NestJS)
            changed: ${{ needs.detect-changes.outputs.identity }}
            context: ./services/identity
          - service: submission
            name: Submission Service (NestJS)
            changed: ${{ needs.detect-changes.outputs.submission }}
            context: ./services/submission
          - service: problem
            name: Problem Service (NestJS)
            changed: ${{ needs.detect-changes.outputs.problem }}
            context: ./services/problem
          - service: github-worker
            name: GitHub Worker (Node.js)
            changed: ${{ needs.detect-changes.outputs.github-worker }}
            context: ./services/github-worker
          - service: ai-analysis
            name: AI Analysis Service (FastAPI)
            changed: ${{ needs.detect-changes.outputs.ai-analysis }}
            context: ./services/ai-analysis
    steps:
      - name: Skip if not changed
        id: check
        run: |
          if [ "${{ matrix.changed }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'
      - uses: docker/setup-qemu-action@v4
        if: steps.check.outputs.skip == 'false'
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v4
        if: steps.check.outputs.skip == 'false'
      # Sprint 168 Phase F (시드 #168-1 회수): GHCR transient timeout 자동 retry guard.
      # force-build Build Gateway + main push Build Submission 연속 2 사례 인과 차단.
      # nick-fields/retry@v3 (1.9k stars, 4M+ DL/month) 표준 retry action.
      # docker/login-action 대체 — env 로 token 전달하여 log mask 자동 (best practice).
      - name: Login to GHCR (with retry)
        if: steps.check.outputs.skip == 'false'
        uses: nick-fields/retry@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          ACTOR: ${{ github.actor }}
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            echo "$GITHUB_TOKEN" | docker login "$REGISTRY" -u "$ACTOR" --password-stdin
      # Sprint 167 시드 #165-2 + Sprint 166 D1: build duration 측정용 시작 시각 기록.
      # docker buildx du 와 결합되어 cache 가시성 신호로 통합 출력된다.
      - name: Record build start time
        if: steps.check.outputs.skip == 'false'
        run: echo "BUILD_START=$(date +%s)" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v7
        if: steps.check.outputs.skip == 'false'
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64
          # Sprint 165 옵션 C: multi-output (main 푸시 + 항상 docker tarball)
          # Sprint 171 시드 #170-1: zstd OCI export 제거. Sprint 170 실측 결과 warm cache 에서
          # zstd 절감 ~0% + zstd tarball 미소비(Trivy 는 docker tarball `--input` 만 사용,
          # 업로드/스캔/푸시 어디서도 안 씀) → 잉여 step 으로 판정, Sprint 165~170 zstd 사이클 종결.
          outputs: |
            type=image,push=${{ github.ref == 'refs/heads/main' }},name=${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:main-${{ github.sha }}
            type=docker,dest=/tmp/image-${{ matrix.service }}.tar
          build-args: APK_CACHE_BUST=${{ env.APK_BUST_VALUE }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Upload image tarball for Trivy scan
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v6
        with:
          name: image-tar-${{ matrix.service }}
          path: /tmp/image-${{ matrix.service }}.tar
          retention-days: 1
      # Sprint 168 시드 #167-3: 3 build job 의 중복 약 30줄 × 3 = 90줄 을 단일 헬퍼로 통합.
      # 호출 인자: <label> <docker_tarball>. BUILD_START env 의존 (Sprint 171: zstd 인자 제거).
      - name: Report build artifact metrics
        if: steps.check.outputs.skip == 'false'
        run: bash scripts/ci/report-build-metrics.sh "${{ matrix.service }}" "/tmp/image-${{ matrix.service }}.tar"

  build-frontend:
    name: Build Frontend (Next.js)
    needs: [detect-changes, test-frontend, audit-npm, secret-scan]
    if: |
      !cancelled() &&
      needs.detect-changes.outputs.frontend == 'true' &&
      needs.test-frontend.result == 'success' &&
      (needs.audit-npm.result == 'success' || needs.audit-npm.result == 'skipped') &&
      needs.secret-scan.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v4
      # Sprint 168 Phase F (시드 #168-1 회수): GHCR transient timeout 자동 retry guard (frontend).
      - name: Login to GHCR (with retry)
        uses: nick-fields/retry@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          ACTOR: ${{ github.actor }}
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            echo "$GITHUB_TOKEN" | docker login "$REGISTRY" -u "$ACTOR" --password-stdin
      # Sprint 167 시드 #165-2 + Sprint 166 D1: build duration 측정용 시작 시각 기록.
      - name: Record build start time
        run: echo "BUILD_START=$(date +%s)" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          platforms: linux/arm64
          # Sprint 165 옵션 C: multi-output (main 푸시 + 항상 docker tarball)
          # Sprint 171 시드 #170-1: zstd OCI export 제거 (warm cache ~0% + 미소비). build-services 와 동일.
          outputs: |
            type=image,push=${{ github.ref == 'refs/heads/main' }},name=${{ env.IMAGE_PREFIX }}-frontend:main-${{ github.sha }}
            type=docker,dest=/tmp/image-frontend.tar
          build-args: APK_CACHE_BUST=${{ env.APK_BUST_VALUE }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      - name: Upload image tarball for Trivy scan
        uses: actions/upload-artifact@v6
        with:
          name: image-tar-frontend
          path: /tmp/image-frontend.tar
          retention-days: 1
      # Sprint 168 시드 #167-3: 3 build job 의 중복을 단일 헬퍼로 통합 (services 와 동일).
      - name: Report build artifact metrics
        run: bash scripts/ci/report-build-metrics.sh "frontend" "/tmp/image-frontend.tar"

  # ============================================================
  # Build Blog — 기술 블로그 정적 사이트 (Next.js SSG + nginx)
  # ============================================================

  build-blog:
    name: Build Blog (SSG)
    needs: [detect-changes, secret-scan]
    if: |
      !cancelled() &&
      needs.detect-changes.outputs.blog == 'true' &&
      needs.secret-scan.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      # ---- host-side SSG 빌드 ----
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: blog/package-lock.json
      - run: npm ci
        working-directory: blog
      - name: ADR conversion self-test
        working-directory: blog
        run: node ../scripts/check-adr-conversion.mjs
      - run: npm run build
        working-directory: blog
      # Sprint 175 #27: SSG 산출물(out/) 존재·비어있지 않음을 명시적으로 검증.
      # next build(output:export) 가 무음 실패하면 빈 out/ 가 그대로 Docker COPY 되어
      # 빈 사이트가 배포될 수 있으므로, 링크 검사 이전에 fail-fast 가드를 둔다.
      - name: Verify SSG output (out/)
        working-directory: blog
        run: |
          if [ ! -d out ] || [ -z "$(ls -A out 2>/dev/null)" ]; then
            echo "::error::blog SSG 산출물(out/)이 비어 있거나 존재하지 않습니다 — next build 무음 실패 의심"
            exit 1
          fi
          echo "blog/out/ 산출물 확인: $(find out -type f | wc -l | tr -d ' ') files"
          ls -la out | head
      - name: ADR link integrity
        # check-adr-links.mjs는 ROOT(=repo root) 기준으로 인자 경로를 resolve하므로
        # working-directory: blog 안에서도 `blog/out/adr` 절대 segment를 명시해야 한다.
        # (Sprint 157 hotfix #3 — 진짜 근본 원인이었음. #1/#2는 무관)
        run: node scripts/check-adr-links.mjs blog/out/adr

      # ---- Docker 이미지 빌드 (COPY only) ----
      - uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v4
      # Sprint 168 Phase F (시드 #168-1 회수): GHCR transient timeout 자동 retry guard (blog).
      - name: Login to GHCR (with retry)
        uses: nick-fields/retry@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          ACTOR: ${{ github.actor }}
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            echo "$GITHUB_TOKEN" | docker login "$REGISTRY" -u "$ACTOR" --password-stdin
      # Sprint 167 시드 #165-2 + Sprint 166 D1: build duration 측정용 시작 시각 기록.
      - name: Record build start time
        run: echo "BUILD_START=$(date +%s)" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v7
        with:
          context: ./blog
          platforms: linux/arm64
          # Sprint 165 옵션 C: multi-output (main 푸시 + 항상 docker tarball)
          # Sprint 171 시드 #170-1: zstd OCI export 제거 (warm cache ~0% + 미소비). build-services 와 동일.
          outputs: |
            type=image,push=${{ github.ref == 'refs/heads/main' }},name=${{ env.IMAGE_PREFIX }}-blog:main-${{ github.sha }}
            type=docker,dest=/tmp/image-blog.tar
          build-args: APK_CACHE_BUST=${{ env.APK_BUST_VALUE }}
          cache-from: type=gha,scope=blog
          cache-to: type=gha,mode=max,scope=blog
      - name: Upload image tarball for Trivy scan
        uses: actions/upload-artifact@v6
        with:
          name: image-tar-blog
          path: /tmp/image-blog.tar
          retention-days: 1
      # Sprint 168 시드 #167-3: 3 build job 의 중복을 단일 헬퍼로 통합 (services 와 동일).
      - name: Report build artifact metrics
        run: bash scripts/ci/report-build-metrics.sh "blog" "/tmp/image-blog.tar"

  # ============================================================
  # Trivy — 이미지 취약점 스캔 (main push 후, deploy 전)
  # ============================================================

  trivy-scan:
    name: Trivy Scan — ${{ matrix.service }}
    needs:
      - detect-changes
      - build-services
      - build-frontend
      - build-blog
    # Sprint 165 옵션 C: PR 단계에서도 Trivy 스캔 (tarball + --input)
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
          - service: identity
          - service: submission
          - service: problem
          - service: github-worker
          - service: ai-analysis
          - service: frontend
          - service: blog
    steps:
      - name: Check if service was built
        id: check
        run: |
          # detect-changes 결과와 build job 성공 여부로 판단
          CHANGED="${{ needs.detect-changes.outputs[matrix.service] }}"
          BUILD_SVC="${{ needs.build-services.result }}"
          BUILD_FE="${{ needs.build-frontend.result }}"
          BUILD_BLOG="${{ needs.build-blog.result }}"

          if [ "${{ matrix.service }}" = "frontend" ]; then
            if [ "$BUILD_FE" != "success" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ matrix.service }}" = "blog" ]; then
            if [ "$BUILD_BLOG" != "success" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            # build-services는 matrix job이므로 전체 결과만 확인 가능
            # changed가 true이고 build-services가 성공이면 실행
            if [ "$CHANGED" != "true" ] || [ "$BUILD_SVC" != "success" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          fi
      - name: Checkout (for .trivyignore)
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v6
        with:
          sparse-checkout: .trivyignore
          sparse-checkout-cone-mode: false
      # Sprint 165 옵션 C: build job 이 업로드한 docker tarball 을 받아서 local scan
      - name: Download image tarball
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v6
        with:
          name: image-tar-${{ matrix.service }}
          path: /tmp
      - name: Install Trivy
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.69.2
      - name: Trivy scan (table)
        id: trivy_table
        if: steps.check.outputs.skip == 'false'
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --format table \
            --input /tmp/image-${{ matrix.service }}.tar
      - name: Trivy scan (SARIF)
        if: always() && steps.check.outputs.skip == 'false'
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --format sarif \
            --output trivy-results.sarif \
            --input /tmp/image-${{ matrix.service }}.tar
      # Sprint 165 Critic R1 P2 + R2 P2 fix: fork PR + same-repo Dependabot PR
      # 모두 GITHUB_TOKEN 이 read-only 라 security-events:write 차단됨 →
      # SARIF 업로드 실패 시 보안 게이트와 무관한 CI red 양산 (Sprint 164
      # noisy red 패턴 재발 차단). GitHub Docs "Dependabot on GitHub Actions"
      # 참고 — same-repo Dependabot PR 도 fork PR 과 동일 권한 제약.
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: >
          always() &&
          steps.check.outputs.skip == 'false' &&
          (github.event_name != 'pull_request' ||
           (github.event.pull_request.head.repo.full_name == github.repository &&
            github.event.pull_request.user.login != 'dependabot[bot]'))
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.service }}
      # Sprint 160 Phase B: deploy 가 service 별 trivy 결과를 lookup 할 수 있도록 artifact 기록
      # (Sprint 159 회귀: ai-analysis Trivy 1건 fail 이 frontend GitOps update 까지 전체 SKIP 시킨 본질 차단)
      - name: Record Trivy result for deploy gate
        if: always() && steps.check.outputs.skip == 'false'
        run: |
          mkdir -p trivy-status
          if [ "${{ steps.trivy_table.outcome }}" = "success" ]; then
            echo "pass" > trivy-status/${{ matrix.service }}.txt
          else
            echo "fail" > trivy-status/${{ matrix.service }}.txt
          fi
      - name: Upload Trivy status artifact
        if: always() && steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v6
        with:
          name: trivy-status-${{ matrix.service }}
          path: trivy-status/
          retention-days: 1

  # ============================================================
  # Deploy — aether-gitops 이미지 태그 업데이트 (ArgoCD 자동 sync)
  # ============================================================

  deploy:
    name: Update GitOps manifests
    needs:
      - secret-scan
      - detect-changes
      - trivy-scan
      - build-services
      - build-frontend
      - build-blog
    # main 브랜치 + 하나 이상의 서비스 빌드 성공 시에만 실행
    # Sprint 160 Phase B: trivy-scan aggregated result 가드 제거 (Sprint 159 회귀 차단).
    # 한 service Trivy fail 이 전 service GitOps update 를 막지 않도록, 가드는 build job 결과만 확인.
    # 실제 service 별 Trivy 결과는 아래 "Filter Trivy-failed services" step 에서 artifact 로 lookup.
    if: |
      github.ref == 'refs/heads/main' && !cancelled() &&
      needs.secret-scan.result == 'success' &&
      (needs.build-services.result == 'success' ||
       needs.build-frontend.result == 'success' ||
       needs.build-blog.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    # Sprint 160 Phase C: notify job 이 service 별 deploy/skip 결과를 활용할 수 있도록 노출
    # (시드 #신규4: "git merge 성공 + 일부 service deploy 차단" 케이스 명시적 분리)
    outputs:
      updated: ${{ steps.update_tags.outputs.updated }}
      skipped_trivy: ${{ steps.update_tags.outputs.skipped_trivy }}
    steps:
      # Sprint 173 시드 #신규4: deploy 게이트 로직을 compute-deploy-gate.sh 로 추출
      # (deploy-simulation 과 공유). deploy job 은 AlgoSu repo 를 full checkout 하지
      # 않으므로(aether-gitops 만 clone) 헬퍼만 sparse-checkout 으로 가져온다.
      - name: Checkout deploy-gate helper
        uses: actions/checkout@v6
        with:
          sparse-checkout: scripts/ci/compute-deploy-gate.sh
          sparse-checkout-cone-mode: false

      - name: Clone aether-gitops
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/tpals0409/aether-gitops.git
          cd aether-gitops
          git config user.name "algosu-ci"
          git config user.email "ci@algosu.dev"

      # Sprint 160 Phase B: trivy-scan matrix 의 service 별 결과를 artifact 로 수집
      # (pattern + merge-multiple 로 한 디렉토리에 평탄화 — `trivy-status/<service>.txt`)
      - name: Download Trivy status artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: trivy-status-*
          path: trivy-status
          merge-multiple: true

      - name: Probe Trivy status artifacts (Sprint 157 시드 #29)
        run: |
          echo "::group::trivy-status directory"
          ls -la trivy-status/ 2>/dev/null || echo "(empty — no service was scanned)"
          for f in trivy-status/*.txt; do
            [ -f "$f" ] && echo "  $(basename "$f" .txt): $(cat "$f")"
          done
          echo "::endgroup::"

      - name: Update image tags for changed services
        id: update_tags
        run: |
          cd aether-gitops/algosu/overlays/prod
          SHA="${{ github.sha }}"
          STATUS_DIR="$GITHUB_WORKSPACE/trivy-status"
          CANDIDATES=""

          # build job 성공 + detect-changes 가 활성화된 서비스를 후보로 수집
          if [ "${{ needs.build-services.result }}" = "success" ]; then
            [ "${{ needs.detect-changes.outputs.gateway }}" = "true" ] && CANDIDATES="${CANDIDATES} gateway"
            [ "${{ needs.detect-changes.outputs.identity }}" = "true" ] && CANDIDATES="${CANDIDATES} identity"
            [ "${{ needs.detect-changes.outputs.submission }}" = "true" ] && CANDIDATES="${CANDIDATES} submission"
            [ "${{ needs.detect-changes.outputs.problem }}" = "true" ] && CANDIDATES="${CANDIDATES} problem"
            [ "${{ needs.detect-changes.outputs.github-worker }}" = "true" ] && CANDIDATES="${CANDIDATES} github-worker"
            [ "${{ needs.detect-changes.outputs.ai-analysis }}" = "true" ] && CANDIDATES="${CANDIDATES} ai-analysis"
          fi
          [ "${{ needs.build-frontend.result }}" = "success" ] && CANDIDATES="${CANDIDATES} frontend"
          [ "${{ needs.build-blog.result }}" = "success" ] && CANDIDATES="${CANDIDATES} blog"

          # Sprint 173 시드 #신규4: service 별 Trivy 게이트(fail-closed) 판정을
          # compute-deploy-gate.sh 로 추출 (deploy-simulation 과 공유). 후보 목록
          # (build 결과 ∩ detect-changes)은 GHA context 의존이라 위에서 계산해 인자로 전달.
          # 명시적 "pass" 만 통과 — fail/missing/기타 전부 차단(Sprint 159 회귀 + Critic R1 P1).
          # 사람용 로그(✓/⚠)는 헬퍼가 stderr 로 내므로 step 로그에 그대로 보임.
          GATE=$(bash "$GITHUB_WORKSPACE/scripts/ci/compute-deploy-gate.sh" "$STATUS_DIR" $CANDIDATES)
          UPDATED=$(printf '%s\n' "$GATE" | sed -n 's/^updated=//p')
          SKIPPED_TRIVY=$(printf '%s\n' "$GATE" | sed -n 's/^skipped_trivy=//p')

          # 통과한 service 만 이미지 태그 업데이트 (python3 + PyYAML)
          for SVC in $UPDATED; do
            python3 -c "
          import yaml
          with open('kustomization.yaml', 'r') as f:
              data = yaml.safe_load(f)
          for img in data.get('images', []):
              if 'algosu-${SVC}' in img.get('name', ''):
                  img['newTag'] = 'main-${SHA}'
          with open('kustomization.yaml', 'w') as f:
              yaml.dump(data, f, default_flow_style=False, sort_keys=False)
          "
            echo "  ✓ algosu-${SVC} → main-${SHA}"
          done

          echo "Updated services:${UPDATED}"
          echo "Skipped (Trivy fail):${SKIPPED_TRIVY}"
          # Phase C 알림 강화용 outputs
          echo "updated=${UPDATED}" >> $GITHUB_OUTPUT
          echo "skipped_trivy=${SKIPPED_TRIVY}" >> $GITHUB_OUTPUT
          cat kustomization.yaml

      - name: Commit and push to aether-gitops
        id: push_gitops
        run: |
          cd aether-gitops
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          # Sprint 169 시드 #168-2: 실제 갱신된 서비스 + Trivy skip 목록을 commit
          # message 에 명시 (이전: head SHA 만 표기 → 어떤 서비스가 배포됐는지 불명확).
          # 모든 서비스가 동일 SHA 를 공유하므로 서비스별 SHA 반복 대신 단일 SHA 표기.
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          UPDATED_CSV=$(echo "${{ steps.update_tags.outputs.updated }}" | xargs | sed 's/ /, /g')
          SKIPPED_CSV=$(echo "${{ steps.update_tags.outputs.skipped_trivy }}" | xargs | sed 's/ /, /g')
          if [ -n "$UPDATED_CSV" ]; then
            MSG="deploy(algosu): update image tags → ${UPDATED_CSV} @ main-${SHORT_SHA}"
          else
            MSG="deploy(algosu): update image tags @ main-${SHORT_SHA}"
          fi
          if [ -n "$SKIPPED_CSV" ]; then
            MSG="${MSG} (skipped: ${SKIPPED_CSV})"
          fi
          git add -A
          git commit -m "$MSG"
          git push

      # Sprint 160 Phase C: deploy 결과를 GitHub Step Summary 에 markdown 으로 노출
      # (시드 #신규4: "git merge 성공" 후에도 일부 service 가 SKIPPED 된 경우 한 페이지에서 가시화)
      # Critic R1 P2 해소: push fail 시 "Deployed services" 거짓 성공 출력 차단 —
      # steps.push_gitops.outcome 기준으로 "Deployed" vs "candidates (push failed)" 분기
      - name: Surface deploy summary
        if: always()
        run: |
          UPDATED="${{ steps.update_tags.outputs.updated }}"
          SKIPPED="${{ steps.update_tags.outputs.skipped_trivy }}"
          PUSH_OUTCOME="${{ steps.push_gitops.outcome }}"
          {
            echo "## Deploy summary — commit \`${{ github.sha }}\`"
            echo ""
            if [ -n "$UPDATED" ]; then
              if [ "$PUSH_OUTCOME" = "success" ]; then
                echo "### ✅ Deployed services"
                for SVC in $UPDATED; do
                  echo "- \`$SVC\` → \`main-${{ github.sha }}\`"
                done
              else
                echo "### 🚫 GitOps push failed (push step outcome: \`${PUSH_OUTCOME}\`)"
                echo "Tags were edited in the local clone but **NOT propagated to aether-gitops**. The following services are *candidates only* — production is unchanged:"
                for SVC in $UPDATED; do
                  echo "- \`$SVC\` — intended tag: \`main-${{ github.sha }}\` (NOT applied)"
                done
                echo ""
                echo "> ⚠️ Investigate \`Commit and push to aether-gitops\` step + GITOPS_TOKEN scope. Manual aether-gitops PR may be required as forward-fix."
                # Sprint 173 시드 #신규5: 운영자가 수동 forward-fix PR 작성 시 그대로
                # 붙여넣을 수 있는 PR body 템플릿을 접기 블록 + 코드펜스로 출력.
                echo ""
                echo "<details><summary>📋 Forward-fix PR body template (copy-paste into aether-gitops)</summary>"
                echo ""
                echo '```markdown'
                echo "## Forward-fix: re-apply algosu image tags (CI push failed @ ${{ github.sha }})"
                echo ""
                echo "CI 가 production image 태그를 갱신했으나 aether-gitops push 에 실패하여 수동 forward-fix 가 필요합니다."
                echo ""
                echo "**File:** \`algosu/overlays/prod/kustomization.yaml\`"
                echo ""
                echo "**Changes (update \`newTag\`):**"
                for SVC in $UPDATED; do
                  echo "- \`algosu-$SVC\` → \`main-${{ github.sha }}\`"
                done
                echo ""
                echo "**Reason:** failed CI run — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                echo '```'
                echo ""
                echo "</details>"
              fi
            else
              echo "### ⚠️ No services were deployed (no candidate matched build + detect-changes)"
            fi
            if [ -n "$SKIPPED" ]; then
              echo ""
              echo "### 🚫 SKIPPED (Trivy fail or status missing)"
              for SVC in $SKIPPED; do
                echo "- \`$SVC\` — production tag NOT advanced. Investigate \`Trivy Scan — $SVC\` job + base image / dependency CVEs."
              done
              echo ""
              echo "> ⚠️ **\"git merge 성공\" ≠ \"deploy 성공\"** — Sprint 159 회귀 시나리오 재발 방지 알림. forward-fix 또는 base image 패치 PR 필요."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # Deploy Preview — PR 시뮬레이션 (Sprint 173 시드 #신규4)
  # deploy job 은 main 전용이라 PR 작성자는 머지 전에 deploy 게이트 결과를 못 본다.
  # deploy 와 동일한 헬퍼(compute-deploy-gate.sh) + 동일한 fail-closed 판정으로
  # "이 PR 이 머지되면 어떤 서비스가 배포/SKIP 되는지" 를 PR 단계로 shift-left.
  # (실제 push 없음 — dry-run, Step Summary 출력만)
  # ============================================================

  deploy-simulation:
    name: Deploy Preview (PR simulation)
    needs:
      - detect-changes
      - build-services
      - build-frontend
      - build-blog
      - trivy-scan
    if: github.event_name == 'pull_request' && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # deploy job 과 동일하게 헬퍼만 sparse-checkout (전체 repo 불필요)
      - name: Checkout deploy-gate helper
        uses: actions/checkout@v6
        with:
          sparse-checkout: scripts/ci/compute-deploy-gate.sh
          sparse-checkout-cone-mode: false

      # trivy-scan job 이 PR 에서도 업로드한 service 별 status artifact 수집.
      # docs-only PR 등 artifact 0건일 때 job red 방지를 위해 continue-on-error.
      - name: Download Trivy status artifacts
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          pattern: trivy-status-*
          path: trivy-status
          merge-multiple: true

      - name: Simulate deploy gate (dry-run)
        run: |
          STATUS_DIR="$GITHUB_WORKSPACE/trivy-status"
          mkdir -p "$STATUS_DIR"
          SHA="${{ github.sha }}"
          CANDIDATES=""

          # deploy job 의 CANDIDATES 계산 로직을 동일하게 미러
          # (build job 성공 + detect-changes 가 활성화된 서비스)
          if [ "${{ needs.build-services.result }}" = "success" ]; then
            [ "${{ needs.detect-changes.outputs.gateway }}" = "true" ] && CANDIDATES="${CANDIDATES} gateway"
            [ "${{ needs.detect-changes.outputs.identity }}" = "true" ] && CANDIDATES="${CANDIDATES} identity"
            [ "${{ needs.detect-changes.outputs.submission }}" = "true" ] && CANDIDATES="${CANDIDATES} submission"
            [ "${{ needs.detect-changes.outputs.problem }}" = "true" ] && CANDIDATES="${CANDIDATES} problem"
            [ "${{ needs.detect-changes.outputs.github-worker }}" = "true" ] && CANDIDATES="${CANDIDATES} github-worker"
            [ "${{ needs.detect-changes.outputs.ai-analysis }}" = "true" ] && CANDIDATES="${CANDIDATES} ai-analysis"
          fi
          [ "${{ needs.build-frontend.result }}" = "success" ] && CANDIDATES="${CANDIDATES} frontend"
          [ "${{ needs.build-blog.result }}" = "success" ] && CANDIDATES="${CANDIDATES} blog"

          # deploy job 과 동일한 헬퍼 / 동일한 fail-closed 판정 (단일 SSOT)
          GATE=$(bash "$GITHUB_WORKSPACE/scripts/ci/compute-deploy-gate.sh" "$STATUS_DIR" $CANDIDATES)
          UPDATED=$(printf '%s\n' "$GATE" | sed -n 's/^updated=//p')
          SKIPPED=$(printf '%s\n' "$GATE" | sed -n 's/^skipped_trivy=//p')

          {
            echo "## 🔮 Deploy preview (simulation) — PR #${{ github.event.pull_request.number }}"
            echo ""
            echo "이 PR 이 main 에 머지되면 아래와 같이 배포됩니다 (실제 push 없음, dry-run)."
            echo ""
            if [ -n "$UPDATED" ]; then
              echo "### ✅ WOULD deploy"
              for SVC in $UPDATED; do
                echo "- \`$SVC\` → \`main-${SHA}\`"
              done
            else
              echo "### ⚠️ WOULD deploy: (none — no candidate matched build + detect-changes)"
            fi
            if [ -n "$SKIPPED" ]; then
              echo ""
              echo "### 🚫 WOULD be SKIPPED (Trivy fail/missing)"
              for SVC in $SKIPPED; do
                echo "- \`$SVC\` — production tag NOT advanced. Investigate \`Trivy Scan — $SVC\` job + base image / dependency CVEs."
              done
              echo ""
              echo "> ⚠️ **\"merge 성공\" ≠ \"deploy 성공\"** — Sprint 159 회귀 시나리오. 머지 전 Trivy fail/missing 해소 권장."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # Notify — 배포 결과 Grafana Annotation
  # ============================================================

  notify:
    name: Deploy Notification
    needs: deploy
    if: always() && needs.deploy.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Grafana deployment annotation
        if: needs.deploy.result == 'success'
        run: |
          # Grafana가 k3s 내부에서 실행되므로 로컬 접근 불가
          # ArgoCD sync 후 배포 서버에서 annotation 생성하도록 aether-gitops에 기록
          echo "Grafana annotation will be created by ArgoCD post-sync hook"
          echo "Deploy SHA: ${{ github.sha }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      # Sprint 160 Phase C: Trivy fail/missing 으로 SKIPPED 된 service 가 있을 때 명시적 warning
      # (Sprint 159 시드 #신규4: deploy pipeline 차단 알림 강화)
      - name: Warn on Trivy-skipped services
        if: needs.deploy.outputs.skipped_trivy != ''
        run: |
          SKIPPED="${{ needs.deploy.outputs.skipped_trivy }}"
          echo "::warning::Deploy 부분 차단 — Trivy fail/missing 으로 SKIPPED 된 service:$SKIPPED"
          echo "::warning::production 의 해당 service 이미지는 \`main-${{ github.sha }}\` 으로 advance 되지 않았습니다."
          echo "::warning::Sprint 159 재발 방지 — '메인 머지 성공' 메시지만 보고 deploy 완료로 가정하지 마세요. 사후 forward-fix 필요."

  # ============================================================
  # E2E: Programmers Full Flow — sourcePlatform 전달 검증 (PR 자동 실행)
  #
  # 범위: GitHub Worker 파일 경로 + MQ 이벤트 계약 + AI 프롬프트 맥락
  # 외부 의존: GitHub API(Octokit stub), Claude API(호출 없음) — 0건
  # 실행: 모든 PR + push on main (Sprint 141 정합 — `github.event_name == 'pull_request'`로 PR 무조건 실행 보장)
  # Python 3.12 사용: str|None 유니언 문법 지원
  # ============================================================

  e2e-programmers:
    name: E2E — Programmers Full Flow
    needs:
      - detect-changes
      - secret-scan
    if: |
      !cancelled() &&
      needs.secret-scan.result == 'success' &&
      (
        needs.detect-changes.outputs.github-worker == 'true' ||
        needs.detect-changes.outputs.ai-analysis == 'true' ||
        github.event_name == 'pull_request'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # ── Node.js (GitHub Worker E2E 의존성 설치용) ──
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Python 3.12 (AI 분석 프롬프트 subprocess 검증) ──
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache E2E node_modules
        uses: actions/cache@v5
        id: cache-e2e-node
        with:
          path: tests/e2e/node_modules
          key: node-e2e-${{ hashFiles('tests/e2e/package-lock.json') }}
          restore-keys: node-e2e-

      - name: Cache github-worker node_modules
        uses: actions/cache@v5
        id: cache-gw-node
        with:
          path: services/github-worker/node_modules
          key: node-github-worker-${{ hashFiles('services/github-worker/package-lock.json') }}
          restore-keys: node-github-worker-

      - name: Cache pip (ai-analysis)
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-e2e-${{ hashFiles('services/ai-analysis/requirements.txt') }}
          restore-keys: pip-e2e-

      - name: Install E2E dependencies
        if: steps.cache-e2e-node.outputs.cache-hit != 'true'
        working-directory: tests/e2e
        run: npm ci

      - name: Install github-worker dependencies
        if: steps.cache-gw-node.outputs.cache-hit != 'true'
        working-directory: services/github-worker
        run: npm ci

      - name: Install ai-analysis Python dependencies
        working-directory: services/ai-analysis
        run: pip install -r requirements.txt

      - name: Run E2E — Programmers Full Flow
        working-directory: tests/e2e
        env:
          NODE_ENV: test
          PYTHON_BIN: python3
        run: npm test -- --ci --verbose --no-coverage

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-programmers-results
          path: tests/e2e/
          retention-days: 7

  # ============================================================
  # E2E Test — 전체 서비스 통합 테스트 (수동 트리거 + 라벨 트리거)
  #
  # 실행 조건 (Sprint 141 — 라벨 기반 PR 트리거 추가):
  # 1. workflow_dispatch (rebuild_all 제외)
  # 2. PR에 `run-e2e-full` 라벨 부착 시 자동 실행 (큰 변경에 한정 명시 트리거)
  # docker-compose 기반 인프라 + 전 서비스 기동 후 e2e-full.sh 실행.
  # PR마다 무조건 실행은 비용/시간 부담 → opt-in 정책.
  # ============================================================

  e2e-test:
    name: E2E Integration Test
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.rebuild_all != 'true') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e-full'))
    needs:
      - test-node
      - test-ai-analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Comment PR — E2E 시작
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🧪 **E2E Integration Test 진행 중**\n\n[워크플로우 실행 보기](${runUrl})`
            });

      - name: Start infrastructure services
        run: |
          docker compose -f docker-compose.dev.yml up -d
          echo "Waiting for infrastructure services to be healthy..."
          docker compose -f docker-compose.dev.yml ps
        env:
          POSTGRES_ROOT_PASSWORD: e2e_test_password
          REDIS_PASSWORD: e2e_test_redis
          RABBITMQ_USER: e2e_user
          RABBITMQ_PASSWORD: e2e_test_rabbitmq

      - name: Wait for infrastructure readiness
        run: |
          # PostgreSQL
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.dev.yml exec -T postgres pg_isready -U algosu_root 2>/dev/null; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

          # Redis
          for i in $(seq 1 20); do
            if docker compose -f docker-compose.dev.yml exec -T redis redis-cli -a e2e_test_redis ping 2>/dev/null | grep -q PONG; then
              echo "Redis is ready"
              break
            fi
            echo "Waiting for Redis... ($i/20)"
            sleep 2
          done

          # RabbitMQ
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.dev.yml exec -T rabbitmq rabbitmq-diagnostics ping 2>/dev/null; then
              echo "RabbitMQ is ready"
              break
            fi
            echo "Waiting for RabbitMQ... ($i/30)"
            sleep 2
          done
        env:
          POSTGRES_ROOT_PASSWORD: e2e_test_password
          REDIS_PASSWORD: e2e_test_redis
          RABBITMQ_USER: e2e_user
          RABBITMQ_PASSWORD: e2e_test_rabbitmq

      - name: Run E2E tests
        run: |
          chmod +x scripts/e2e-full.sh
          ./scripts/e2e-full.sh
        env:
          GATEWAY_URL: http://localhost:3000

      - name: Collect service logs on failure
        if: failure()
        run: |
          echo "=== Docker Compose Logs ==="
          docker compose -f docker-compose.dev.yml logs --tail=100
        env:
          POSTGRES_ROOT_PASSWORD: e2e_test_password
          REDIS_PASSWORD: e2e_test_redis
          RABBITMQ_USER: e2e_user
          RABBITMQ_PASSWORD: e2e_test_rabbitmq

      - name: Upload logs artifact on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-logs
          path: /tmp/e2e-logs/
          retention-days: 7

      - name: Comment PR — E2E 실패
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **E2E Integration Test 실패**\n\n[실패 로그 확인](${runUrl})\n\nArtifact \`e2e-logs\`에서 상세 로그를 다운로드할 수 있습니다.`
            });

      - name: Teardown infrastructure
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
        env:
          POSTGRES_ROOT_PASSWORD: e2e_test_password
          REDIS_PASSWORD: e2e_test_redis
          RABBITMQ_USER: e2e_user
          RABBITMQ_PASSWORD: e2e_test_rabbitmq
