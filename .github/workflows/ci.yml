# ============================================================
# AlgoSu — GitHub Actions CI 파이프라인
#
# 규칙:
#   - path filter로 변경된 서비스만 테스트+빌드 (비용 절감)
#   - 테스트 통과 후에만 Docker 빌드 진행
#   - ARM aarch64 이미지 빌드 (OCI Free Tier: VM.Standard.A1.Flex)
#   - GHCR 푸시 태그: main-{git-sha} (latest 태그 절대 금지)
# ============================================================

name: CI — Test, Build & Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Force rebuild all services'
        required: false
        default: 'false'

# 최소 권한 원칙: 기본 제로, 각 job에서 필요 권한만 명시
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/algosu
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================================
  # Security Scan — 시크릿 유출 + .env 커밋 방지 (모든 push/PR에 실행)
  # ============================================================

  secret-scan:
    name: Secret & Env Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks secret scan
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --verbose
          else
            gitleaks detect --source . --config .gitleaks.toml --verbose
          fi

      - name: Reject committed .env files
        run: |
          # Git 인덱스 내 .env 파일 탐지 (.env.example 제외)
          VIOLATIONS=$(git ls-files | grep -E '(^|/)\.env($|\..*)' | grep -v '\.env\.example' || true)

          # PR인 경우: 변경 파일 중 .env 추가 탐지
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_ENV=$(git diff --name-only "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              | grep -E '(^|/)\.env($|\..*)' | grep -v '\.env\.example' || true)
            [ -n "$PR_ENV" ] && VIOLATIONS="$VIOLATIONS $PR_ENV"
          fi

          if [ -n "$(echo "$VIOLATIONS" | tr -d ' ')" ]; then
            echo "::error::SECURITY VIOLATION: .env files detected in Git"
            echo "위반 파일: $VIOLATIONS"
            echo "조치: git rm --cached <파일명> 후 .gitignore 확인"
            exit 1
          fi

          echo "env-check: PASS"

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      gateway:       ${{ steps.result.outputs.gateway }}
      identity:      ${{ steps.result.outputs.identity }}
      submission:    ${{ steps.result.outputs.submission }}
      problem:       ${{ steps.result.outputs.problem }}
      github-worker: ${{ steps.result.outputs.github-worker }}
      ai-analysis:   ${{ steps.result.outputs.ai-analysis }}
      frontend:      ${{ steps.result.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - 'services/gateway/**'
            identity:
              - 'services/identity/**'
            submission:
              - 'services/submission/**'
            problem:
              - 'services/problem/**'
            github-worker:
              - 'services/github-worker/**'
            ai-analysis:
              - 'services/ai-analysis/**'
            frontend:
              - 'frontend/**'
      - name: Apply rebuild_all override
        id: result
        run: |
          if [ "${{ github.event.inputs.rebuild_all }}" = "true" ]; then
            echo "gateway=true" >> $GITHUB_OUTPUT
            echo "identity=true" >> $GITHUB_OUTPUT
            echo "submission=true" >> $GITHUB_OUTPUT
            echo "problem=true" >> $GITHUB_OUTPUT
            echo "github-worker=true" >> $GITHUB_OUTPUT
            echo "ai-analysis=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "gateway=${{ steps.filter.outputs.gateway }}" >> $GITHUB_OUTPUT
            echo "identity=${{ steps.filter.outputs.identity }}" >> $GITHUB_OUTPUT
            echo "submission=${{ steps.filter.outputs.submission }}" >> $GITHUB_OUTPUT
            echo "problem=${{ steps.filter.outputs.problem }}" >> $GITHUB_OUTPUT
            echo "github-worker=${{ steps.filter.outputs.github-worker }}" >> $GITHUB_OUTPUT
            echo "ai-analysis=${{ steps.filter.outputs.ai-analysis }}" >> $GITHUB_OUTPUT
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # Commit Lint — PR 시 Conventional Commits 강제
  # ============================================================

  commit-lint:
    name: Lint Commit Messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  # ============================================================
  # Quality Gate — lint + typecheck (변경된 서비스만)
  # ============================================================

  quality-nestjs:
    name: Quality — ${{ matrix.service }}
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
            has_eslint: 'true'
            lint_glob: '{src,test}/**/*.ts'
          - service: identity
            changed: ${{ needs.detect-changes.outputs.identity }}
            has_eslint: 'true'
            lint_glob: '{src,test}/**/*.ts'
          - service: submission
            changed: ${{ needs.detect-changes.outputs.submission }}
            has_eslint: 'true'
            lint_glob: '{src,test}/**/*.ts'
          - service: problem
            changed: ${{ needs.detect-changes.outputs.problem }}
            has_eslint: 'true'
            lint_glob: '{src,test}/**/*.ts'
          - service: github-worker
            changed: ${{ needs.detect-changes.outputs.github-worker }}
            has_eslint: 'true'
            lint_glob: 'src/**/*.ts'
    steps:
      - name: Skip if not changed
        id: check
        run: |
          if [ "${{ matrix.changed }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'
      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        working-directory: services/${{ matrix.service }}
        run: npm ci
      - name: ESLint
        if: steps.check.outputs.skip == 'false' && matrix.has_eslint == 'true'
        working-directory: services/${{ matrix.service }}
        run: npx eslint "${{ matrix.lint_glob }}"
      - name: TypeScript typecheck
        if: steps.check.outputs.skip == 'false'
        working-directory: services/${{ matrix.service }}
        run: npx tsc --noEmit

  quality-python:
    name: Quality — ai-analysis
    needs: detect-changes
    if: needs.detect-changes.outputs.ai-analysis == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: ruff lint
        working-directory: services/ai-analysis
        run: ruff check src/
      - name: ruff format check
        working-directory: services/ai-analysis
        run: ruff format --check src/

  quality-frontend:
    name: Quality — frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: next lint
        working-directory: frontend
        run: npx next lint
      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit

  # ============================================================
  # Test Jobs — Quality Gate 통과 후에만 테스트 진행
  # ============================================================

  test-gateway:
    name: Test Gateway
    needs: [detect-changes, quality-nestjs]
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/gateway/package-lock.json
      - name: Install dependencies
        working-directory: services/gateway
        run: npm ci
      - name: Run unit tests
        working-directory: services/gateway
        run: npm test -- --coverage --ci
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-gateway
          path: services/gateway/coverage/
          retention-days: 7

  test-identity:
    name: Test Identity
    needs: [detect-changes, quality-nestjs]
    if: needs.detect-changes.outputs.identity == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/identity/package-lock.json
      - name: Install dependencies
        working-directory: services/identity
        run: npm ci
      - name: Run unit tests
        working-directory: services/identity
        run: npm test -- --coverage --ci --passWithNoTests
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-identity
          path: services/identity/coverage/
          retention-days: 7

  test-submission:
    name: Test Submission
    needs: [detect-changes, quality-nestjs]
    if: needs.detect-changes.outputs.submission == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/submission/package-lock.json
      - name: Install dependencies
        working-directory: services/submission
        run: npm ci
      - name: Run unit tests
        working-directory: services/submission
        run: npm test -- --coverage --ci --forceExit
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-submission
          path: services/submission/coverage/
          retention-days: 7

  test-problem:
    name: Test Problem
    needs: [detect-changes, quality-nestjs]
    if: needs.detect-changes.outputs.problem == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/problem/package-lock.json
      - name: Install dependencies
        working-directory: services/problem
        run: npm ci
      - name: Run unit tests
        working-directory: services/problem
        run: npm test -- --coverage --ci
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-problem
          path: services/problem/coverage/
          retention-days: 7

  test-github-worker:
    name: Test GitHub Worker
    needs: [detect-changes, quality-nestjs]
    if: needs.detect-changes.outputs.github-worker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/github-worker/package-lock.json
      - name: Install dependencies
        working-directory: services/github-worker
        run: npm ci
      - name: Run unit tests
        working-directory: services/github-worker
        run: npm test -- --coverage --ci
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-github-worker
          path: services/github-worker/coverage/
          retention-days: 7

  test-ai-analysis:
    name: Test AI Analysis
    needs: [detect-changes, quality-python]
    if: needs.detect-changes.outputs.ai-analysis == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: services/ai-analysis/requirements*.txt
      - name: Install dependencies
        working-directory: services/ai-analysis
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests
        working-directory: services/ai-analysis
        run: python -m pytest tests/ -v --cov=src --cov-report=xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-ai-analysis
          path: services/ai-analysis/coverage.xml
          retention-days: 7

  # ============================================================
  # Build Jobs — 테스트 통과 후 Docker 빌드 + GHCR 푸시
  # ============================================================

  build-gateway:
    name: Build Gateway (NestJS)
    needs: [detect-changes, test-gateway]
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/gateway
          platforms: linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}-gateway:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-identity:
    name: Build Identity Service (NestJS)
    needs: [detect-changes, test-identity]
    if: needs.detect-changes.outputs.identity == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/identity
          platforms: linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}-identity:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-submission:
    name: Build Submission Service (NestJS)
    needs: [detect-changes, test-submission]
    if: needs.detect-changes.outputs.submission == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/submission
          platforms: linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}-submission:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-problem:
    name: Build Problem Service (NestJS)
    needs: [detect-changes, test-problem]
    if: needs.detect-changes.outputs.problem == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/problem
          platforms: linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}-problem:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-github-worker:
    name: Build GitHub Worker (Node.js)
    needs: [detect-changes, test-github-worker]
    if: needs.detect-changes.outputs.github-worker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/github-worker
          platforms: linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}-github-worker:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ai-analysis:
    name: Build AI Analysis Service (FastAPI)
    needs: [detect-changes, test-ai-analysis]
    if: needs.detect-changes.outputs.ai-analysis == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/ai-analysis
          platforms: linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}-ai-analysis:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend (Next.js)
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/arm64
          network: host
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}-frontend:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Trivy — 이미지 취약점 스캔 (main push 후, deploy 전)
  # ============================================================

  trivy-scan:
    name: Trivy Scan — ${{ matrix.service }}
    needs:
      - detect-changes
      - build-gateway
      - build-identity
      - build-submission
      - build-problem
      - build-github-worker
      - build-ai-analysis
      - build-frontend
    if: github.ref == 'refs/heads/main' && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            built: ${{ needs.build-gateway.result }}
          - service: identity
            built: ${{ needs.build-identity.result }}
          - service: submission
            built: ${{ needs.build-submission.result }}
          - service: problem
            built: ${{ needs.build-problem.result }}
          - service: github-worker
            built: ${{ needs.build-github-worker.result }}
          - service: ai-analysis
            built: ${{ needs.build-ai-analysis.result }}
          - service: frontend
            built: ${{ needs.build-frontend.result }}
    steps:
      - name: Skip if not built
        id: check
        run: |
          if [ "${{ matrix.built }}" != "success" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Install Trivy
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.59.1
      - name: Trivy scan
        if: steps.check.outputs.skip == 'false'
        run: |
          trivy image \
            --platform linux/arm64 \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            --format table \
            "${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:main-${{ github.sha }}"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Deploy — aether-gitops 이미지 태그 업데이트 (ArgoCD 자동 sync)
  # ============================================================

  deploy:
    name: Update GitOps manifests
    needs:
      - secret-scan
      - detect-changes
      - trivy-scan
      - build-gateway
      - build-identity
      - build-submission
      - build-problem
      - build-github-worker
      - build-ai-analysis
      - build-frontend
    # main 브랜치 + 하나 이상의 서비스 빌드 성공 시에만 실행
    if: |
      github.ref == 'refs/heads/main' && !cancelled() &&
      needs.secret-scan.result == 'success' &&
      needs.trivy-scan.result != 'failure' &&
      (needs.build-gateway.result == 'success' ||
       needs.build-identity.result == 'success' ||
       needs.build-submission.result == 'success' ||
       needs.build-problem.result == 'success' ||
       needs.build-github-worker.result == 'success' ||
       needs.build-ai-analysis.result == 'success' ||
       needs.build-frontend.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - name: Clone aether-gitops
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/tpals0409/aether-gitops.git
          cd aether-gitops
          git config user.name "algosu-ci"
          git config user.email "ci@algosu.dev"

      - name: Update image tags for changed services
        run: |
          cd aether-gitops/algoso/overlays/prod
          SHA="${{ github.sha }}"
          UPDATED=""

          # 빌드 성공한 서비스만 목록에 추가
          [ "${{ needs.build-gateway.result }}" = "success" ] && UPDATED="${UPDATED} gateway"
          [ "${{ needs.build-identity.result }}" = "success" ] && UPDATED="${UPDATED} identity"
          [ "${{ needs.build-submission.result }}" = "success" ] && UPDATED="${UPDATED} submission"
          [ "${{ needs.build-problem.result }}" = "success" ] && UPDATED="${UPDATED} problem"
          [ "${{ needs.build-github-worker.result }}" = "success" ] && UPDATED="${UPDATED} github-worker"
          [ "${{ needs.build-ai-analysis.result }}" = "success" ] && UPDATED="${UPDATED} ai-analysis"
          [ "${{ needs.build-frontend.result }}" = "success" ] && UPDATED="${UPDATED} frontend"

          # 변경된 서비스만 이미지 태그 업데이트 (python3 + PyYAML)
          for SVC in $UPDATED; do
            python3 -c "
          import yaml
          with open('kustomization.yaml', 'r') as f:
              data = yaml.safe_load(f)
          for img in data.get('images', []):
              if 'algosu-${SVC}' in img.get('name', ''):
                  img['newTag'] = 'main-${SHA}'
          with open('kustomization.yaml', 'w') as f:
              yaml.dump(data, f, default_flow_style=False, sort_keys=False)
          "
            echo "  ✓ algosu-${SVC} → main-${SHA}"
          done

          echo "Updated services:${UPDATED}"
          cat kustomization.yaml

      - name: Commit and push to aether-gitops
        run: |
          cd aether-gitops
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add -A
          git commit -m "deploy(algoso): update image tags → main-${{ github.sha }}"
          git push

  # ============================================================
  # Notify — 배포 결과 Discord 알림 + Grafana Annotation
  # ============================================================

  notify:
    name: Deploy Notification
    needs: deploy
    if: always() && needs.deploy.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Discord notification
        env:
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          WEBHOOK_DEPLOY: ${{ secrets.DISCORD_WEBHOOK_DEPLOY }}
          WEBHOOK_EMERGENCY: ${{ secrets.DISCORD_WEBHOOK_EMERGENCY }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$DEPLOY_RESULT" = "success" ]; then
            COLOR=3066993
            STATUS="배포 성공"
            WEBHOOK="$WEBHOOK_DEPLOY"
          else
            COLOR=15158332
            STATUS="배포 실패"
            WEBHOOK="$WEBHOOK_EMERGENCY"
          fi

          if [ -z "$WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping"
            exit 0
          fi

          curl -sf -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"[${STATUS}] AlgoSu GitOps\",
                \"color\": ${COLOR},
                \"fields\": [
                  {\"name\": \"커밋\", \"value\": \"${SHA:0:8}\", \"inline\": true},
                  {\"name\": \"실행자\", \"value\": \"${ACTOR}\", \"inline\": true},
                  {\"name\": \"방식\", \"value\": \"aether-gitops → ArgoCD\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"AlgoSu CI/CD\"}
              }]
            }" || echo "Discord notification failed, continuing"

      - name: Grafana deployment annotation
        if: needs.deploy.result == 'success'
        run: |
          # Grafana가 k3s 내부에서 실행되므로 로컬 접근 불가
          # ArgoCD sync 후 배포 서버에서 annotation 생성하도록 aether-gitops에 기록
          echo "Grafana annotation will be created by ArgoCD post-sync hook"
          echo "Deploy SHA: ${{ github.sha }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
