version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # 메이저 버전 업그레이드는 계획된 Sprint에서 수행
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # NestJS 서비스 (5개)
  - package-ecosystem: "npm"
    directory: "/services/gateway"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "gateway"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      gateway-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/services/identity"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "identity"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      identity-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/services/submission"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "submission"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      submission-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/services/problem"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "problem"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      problem-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/services/github-worker"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "github-worker"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      github-worker-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ai-analysis (Python)
  - package-ecosystem: "pip"
    directory: "/services/ai-analysis"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "ai-analysis"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      ai-analysis-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Frontend (Next.js)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # eslint-config-next는 Next.js 메이저 버전과 일치해야 함
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]

  # Docker
  - package-ecosystem: "docker"
    directory: "/services/gateway"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(docker)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/services/ai-analysis"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(docker)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
