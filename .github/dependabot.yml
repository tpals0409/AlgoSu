version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci(deps)"

  # NestJS 서비스 (5개)
  - package-ecosystem: "npm"
    directory: "/services/gateway"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "gateway"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/services/identity"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "identity"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

