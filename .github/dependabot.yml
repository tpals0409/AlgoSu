    open-pull-requests-limit: 5

  # ai-analysis (Python)
  - package-ecosystem: "pip"
    directory: "/services/ai-analysis"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "ai-analysis"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # Frontend (Next.js)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # Docker
  - package-ecosystem: "docker"
    directory: "/services/gateway"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: "docker"
    directory: "/services/ai-analysis"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(docker)"
