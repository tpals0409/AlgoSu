<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#04 GitHub Link - AlgoSu Mockup</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
  <div style="max-width:400px; width:100%;">
    <div class="card">
      <div class="card-header">
        <div class="card-title">GitHub Account Connection</div>
        <div class="card-desc">GitHub connection is required to use code submission features.</div>
      </div>
      <div class="card-body space-y-4">
        <div style="background:var(--bg-alt);border-radius:var(--radius);padding:16px;" class="space-y-3">
          <div class="flex items-center gap-2">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0;"></div>
            <span class="text-sm text-muted">Code submissions auto-push to GitHub.</span>
          </div>
          <div class="flex items-center gap-2">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0;"></div>
            <span class="text-sm text-muted">Share code and get AI analysis with team.</span>
          </div>
          <div class="flex items-center gap-2">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0;"></div>
            <span class="text-sm text-muted">Without GitHub, only problem viewing is available.</span>
          </div>
        </div>
      </div>
      <div class="card-footer" style="flex-direction:column;">
        <button class="btn btn-primary w-full" style="justify-content:center;">Connect GitHub Account</button>
        <p class="text-xs text-muted text-center">You can disconnect anytime in settings.</p>
      </div>
    </div>
  </div>
</div>
<div class="mockup-label">#04 GitHub Link</div>
</body>
</html>
