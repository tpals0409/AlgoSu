<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>#09 Study Create - AlgoSu Mockup</title><link rel="stylesheet" href="shared.css"></head>
<body>
<div class="page">
  <div class="nav"><div class="nav-inner"><a href="00-index.html" class="nav-logo" style="text-decoration:none"><div class="logo-icon">A</div> AlgoSu</a></div></div>
  <div class="main">
    <div style="max-width:640px;margin:0 auto;" class="space-y-4">
      <a href="08-studies.html" class="text-xs text-muted" style="text-decoration:none;">&larr; Study List</a>
      <div>
        <h1 class="text-xl font-bold">Create New Study</h1>
        <p class="text-xs text-muted mt-1">Solve algorithm problems together with team members</p>
      </div>
      <div class="card">
        <div class="card-body space-y-4">
          <div>
            <label class="input-label">Study Name</label>
            <input class="input" placeholder="e.g., Algorithm Study Group 1">
          </div>
          <div>
            <label class="input-label">Nickname</label>
            <input class="input" placeholder="Nickname to use in study">
          </div>
          <div>
            <label class="input-label">Description (Optional)</label>
            <input class="input" placeholder="Brief description of the study">
          </div>
        </div>
        <div class="card-footer">
          <button class="btn btn-ghost" style="flex:1">Cancel</button>
          <button class="btn btn-primary" style="flex:1">Create Study</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="mockup-label">#09 Study Create</div>
</body></html>
