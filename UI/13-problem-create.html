<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>#13 Problem Create - AlgoSu Mockup</title><link rel="stylesheet" href="shared.css"></head>
<body>
<div class="page">
  <div class="nav"><div class="nav-inner"><a href="00-index.html" class="nav-logo" style="text-decoration:none"><div class="logo-icon">A</div> AlgoSu</a><div class="nav-links"><a href="06-dashboard.html" class="nav-link">Dashboard</a><a href="12-problems.html" class="nav-link active">Problems</a><a href="18-submissions.html" class="nav-link">Submissions</a></div></div></div>
  <div class="main">
    <div style="max-width:640px;margin:0 auto;" class="space-y-4">
      <a href="12-problems.html" class="text-xs text-muted" style="text-decoration:none;">&larr; Problem List</a>
      <div>
        <h1 class="text-xl font-bold">Add New Problem</h1>
        <p class="text-xs text-muted mt-1">Search BOJ or enter manually</p>
      </div>

      <!-- BOJ Search -->
      <div class="card">
        <div class="card-header"><span class="card-title">BOJ Search</span></div>
        <div class="card-body space-y-3">
          <div class="flex items-center gap-2">
            <input class="input" placeholder="BOJ problem number (e.g. 1000)" style="flex:1">
            <button class="btn btn-primary">Search</button>
          </div>
          <!-- Search Result -->
          <div style="background:var(--bg-alt);border-radius:var(--radius);padding:12px;" class="flex items-center justify-between">
            <div>
              <p class="text-sm font-bold">1000 - A+B</p>
              <div class="flex items-center gap-2 mt-1">
                <span class="diff-badge diff-bronze">Bronze V</span>
                <span class="text-xs text-muted">acmicpc.net/problem/1000</span>
              </div>
            </div>
            <button class="btn btn-ghost btn-sm" style="color:var(--success)">Apply</button>
          </div>
        </div>
      </div>

      <!-- Form -->
      <div class="card">
        <div class="card-header"><span class="card-title">Problem Details</span></div>
        <div class="card-body space-y-4">
          <div>
            <label class="input-label">Title *</label>
            <input class="input" placeholder="Problem title" value="A+B">
          </div>
          <div>
            <label class="input-label">Description</label>
            <textarea class="input" style="min-height:80px;resize:vertical;" placeholder="Problem description or notes"></textarea>
          </div>
          <div class="grid" style="grid-template-columns:1fr 1fr;gap:12px;">
            <div>
              <label class="input-label">Difficulty *</label>
              <select class="input">
                <option>Select difficulty</option>
                <option>Bronze</option>
                <option selected>Silver</option>
                <option>Gold</option>
                <option>Platinum</option>
                <option>Diamond</option>
              </select>
            </div>
            <div>
              <label class="input-label">Week *</label>
              <select class="input">
                <option>Week 1</option>
                <option selected>Week 2</option>
                <option>Week 3</option>
              </select>
            </div>
          </div>
          <div>
            <label class="input-label">Deadline *</label>
            <input class="input" type="date" value="2026-03-14">
          </div>
          <div>
            <label class="input-label">Allowed Languages</label>
            <div class="flex gap-2" style="flex-wrap:wrap;">
              <span class="badge badge-primary" style="cursor:pointer">Python &#10003;</span>
              <span class="badge badge-primary" style="cursor:pointer">Java &#10003;</span>
              <span class="badge badge-primary" style="cursor:pointer">C++ &#10003;</span>
              <span class="badge badge-muted" style="cursor:pointer">JavaScript</span>
              <span class="badge badge-muted" style="cursor:pointer">Go</span>
            </div>
          </div>
          <div>
            <label class="input-label">Source URL</label>
            <input class="input" placeholder="https://www.acmicpc.net/problem/1000" value="https://www.acmicpc.net/problem/1000">
          </div>
        </div>
        <div class="card-footer">
          <button class="btn btn-ghost" style="flex:1">Cancel</button>
          <button class="btn btn-primary" style="flex:1">Create Problem</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="mockup-label">#13 Problem Create</div>
</body></html>
