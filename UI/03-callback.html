<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#03 Callback - AlgoSu Mockup</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
  <div style="max-width:400px; width:100%;">
    <!-- State 1: Loading -->
    <div class="text-center mb-4" style="margin-bottom:48px">
      <div class="skeleton" style="width:48px;height:48px;border-radius:50%;margin:0 auto 16px;"></div>
      <p class="text-sm text-muted">Processing login...</p>
    </div>

    <!-- State 2: GitHub Prompt -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">GitHub Account Connection</div>
        <div class="card-desc">Connect GitHub to use auto-upload feature.</div>
      </div>
      <div class="card-body space-y-4">
        <div style="background:var(--bg-alt);border-radius:var(--radius);padding:16px;" class="space-y-3">
          <div class="flex items-center gap-2">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:2px;"></div>
            <span class="text-sm text-muted">Code submissions auto-push to GitHub.</span>
          </div>
          <div class="flex items-center gap-2">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:2px;"></div>
            <span class="text-sm text-muted">Share code and get AI analysis with team.</span>
          </div>
          <div class="flex items-center gap-2">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:2px;"></div>
            <span class="text-sm text-muted">You can set up GitHub anytime in profile.</span>
          </div>
        </div>
      </div>
      <div class="card-footer" style="flex-direction:column;">
        <button class="btn btn-primary w-full" style="justify-content:center;">Connect GitHub</button>
        <button class="btn btn-ghost w-full" style="justify-content:center;">Skip for now</button>
      </div>
    </div>
  </div>
</div>
<div class="mockup-label">#03 Callback</div>
</body>
</html>
